<!doctype html>
<title>竞品情报看板 · ZMX Competitor Intel</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  color-scheme: dark;
  --surface-0: #0a0b0d;
  --surface-1: #131418;
  --surface-2: #1b1d22;
  --surface-3: #24262c;
  --text-primary: #f3f4f6;
  --text-secondary: #a8adb8;
  --text-muted: #6b7180;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.16);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow-card: 0 1px 2px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03) inset;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);

  --hue-campaign: #5b9dee;
  --hue-product: #2fd39a;
  --hue-listing: #f0b429;
  --hue-delisting: #f0645f;

  --status-good: #2fd39a;
  --status-warning: #f0b429;
  --status-serious: #f0895f;
  --status-critical: #f0645f;

  --loc-en: #5b9dee;
  --loc-fr: #9b8ce8;
  --loc-vn: #f0895f;
  --loc-id: #2fd39a;
  --loc-asia: #ec8fb0;

  --on-accent: #071018;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--surface-0); }
body {
  font-family: var(--font-sans); color: var(--text-primary); background: var(--surface-0);
  max-width: 1120px; margin: 0 auto; padding-bottom: 4rem;
  -webkit-font-smoothing: antialiased;
}
button, input, select { font-family: inherit; }
button { cursor: pointer; }
a { color: inherit; }
::selection { background: color-mix(in srgb, var(--hue-campaign) 35%, transparent); }
*:focus-visible { outline: 2px solid var(--hue-campaign); outline-offset: 2px; border-radius: 3px; }

/* ---------- top bar ---------- */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 1.5rem; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: color-mix(in srgb, var(--surface-0) 88%, transparent);
  backdrop-filter: blur(10px); z-index: 10;
}
.topbar-left { display: flex; align-items: baseline; gap: 12px; }
.topbar-title { font-size: 15px; font-weight: 650; letter-spacing: -0.01em; }
.topbar-date { font-size: 12.5px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.topbar-right { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--status-good); box-shadow: 0 0 0 3px color-mix(in srgb, var(--status-good) 20%, transparent); }

/* ---------- locale tabs ---------- */
.locale-tabs { display: flex; gap: 2px; padding: 0.6rem 1.5rem 0; overflow-x: auto; }
.locale-tab {
  padding: 7px 14px; font-size: 13px; color: var(--text-secondary); cursor: pointer;
  white-space: nowrap; user-select: none; border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  border-bottom: 2px solid transparent; transition: color 0.15s var(--ease), background 0.15s var(--ease);
  font-weight: 500;
}
.locale-tab:hover { color: var(--text-primary); background: var(--surface-1); }
.locale-tab.active { color: var(--hue-campaign); border-bottom-color: var(--hue-campaign); background: var(--surface-1); font-weight: 650; }
.locale-tab.accent-tab { color: #f0b429; }
.locale-tab.accent-tab.active { color: #f0b429; border-bottom-color: #f0b429; }
.locale-tab.global { color: var(--text-muted); }
.locale-tab.global.active { color: var(--hue-campaign); }
.tabs-divider { width: 1px; align-self: stretch; margin: 8px 6px; background: var(--border); flex-shrink: 0; }

/* ---------- section scaffolding ---------- */
.section-label { font-size: 11px; font-weight: 650; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; padding: 1.5rem 1.5rem 0.6rem; }
.tab-pane { display: none; flex-direction: column; gap: 0.35rem; animation: fadeIn 0.18s var(--ease); }
.tab-pane.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }

/* ---------- stat cards ---------- */
.overview-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 10px; padding: 0 1.5rem; }
@media (max-width: 1024px) { .overview-grid { grid-template-columns: repeat(3, minmax(0,1fr)); } }
@media (max-width: 480px) { .overview-grid { grid-template-columns: repeat(2, minmax(0,1fr)); } }
.stat-card {
  background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.85rem 1rem; box-shadow: var(--shadow-card); transition: border-color 0.15s var(--ease);
}
.stat-card:hover { border-color: var(--border-strong); }
.stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
.stat-value { font-size: 24px; font-weight: 650; line-height: 1.1; letter-spacing: -0.02em; font-variant-numeric: proportional-nums; }
.stat-value.accent { color: var(--hue-campaign); }
.stat-value.warn { color: var(--status-warning); }
.stat-value.danger { color: var(--status-critical); }
.stat-delta { font-size: 11px; color: var(--text-muted); margin-top: 5px; }

/* ---------- daily digest hero ---------- */
.digest-hero {
  margin: 1.1rem 1.5rem 0; padding: 1.1rem 1.25rem; border-radius: var(--radius-lg);
  background: linear-gradient(155deg, color-mix(in srgb, var(--hue-campaign) 12%, var(--surface-1)), var(--surface-1));
  border: 1px solid color-mix(in srgb, var(--hue-campaign) 25%, var(--border));
  box-shadow: var(--shadow-card);
}
.digest-hero-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--hue-campaign); margin-bottom: 6px; }
.digest-hero-text { font-size: 13.5px; color: var(--text-primary); line-height: 1.7; }

/* ---------- analysis blocks (grouped batch insights) ---------- */
.analysis-groups { padding: 0 1.5rem; display: flex; flex-direction: column; gap: 14px; }
.analysis-group { display: flex; flex-direction: column; gap: 8px; }
.analysis-group-title { display: flex; align-items: center; gap: 8px; }
.analysis-group-count { font-size: 11.5px; color: var(--text-muted); }
.analysis-card {
  background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.8rem 1rem; box-shadow: var(--shadow-card); transition: border-color 0.15s var(--ease);
}
.analysis-card:hover { border-color: var(--border-strong); }
.analysis-card-head { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 8px; }
.analysis-body { font-size: 12.5px; color: var(--text-primary); line-height: 1.65; white-space: pre-line; }
.analysis-body.clamped { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.analysis-toggle {
  margin-top: 7px; background: none; border: none; padding: 0; font-size: 11.5px;
  color: var(--hue-campaign); font-weight: 600; transition: opacity 0.12s;
}
.analysis-toggle:hover { opacity: 0.75; }
.digest-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; margin-left: 8px; vertical-align: middle; background: var(--surface-2); color: var(--text-muted); border: 1px dashed var(--border-strong); text-transform: none; letter-spacing: 0; }
.digest-focus { margin-top: 8px; font-size: 12.5px; color: var(--hue-campaign); font-weight: 600; }

/* ---------- highlights ---------- */
.highlights-list { padding: 0 1.5rem; display: flex; flex-direction: column; gap: 8px; }
.highlight-card {
  background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.85rem 1rem; display: flex; align-items: flex-start; gap: 12px;
  box-shadow: var(--shadow-card); transition: border-color 0.15s var(--ease), transform 0.15s var(--ease);
}
.highlight-card:hover { border-color: var(--border-strong); }
.highlight-card.pri-high { border-left: 3px solid var(--status-critical); }
.hl-source { font-size: 11px; font-weight: 650; background: color-mix(in srgb, var(--hue-campaign) 16%, transparent); color: var(--hue-campaign); padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
.hl-body { flex: 1; min-width: 0; }
.hl-title { font-size: 13.5px; font-weight: 600; overflow-wrap: anywhere; line-height: 1.4; }
.hl-summary { font-size: 12.5px; color: var(--text-secondary); margin-top: 4px; line-height: 1.55; }
.hl-meta { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.priority-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--status-critical); flex-shrink: 0; margin-top: 6px; box-shadow: 0 0 0 3px color-mix(in srgb, var(--status-critical) 18%, transparent); }

.tag { font-size: 10.5px; padding: 3px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; letter-spacing: 0.01em; }
.tag-missing { background: color-mix(in srgb, var(--status-critical) 18%, transparent); color: #ff9d99; }
.tag-diff { background: color-mix(in srgb, var(--status-warning) 20%, transparent); color: #f6cb6b; }
.tag-same { background: color-mix(in srgb, var(--status-good) 16%, transparent); color: var(--status-good); }
.tag-mixed { background: color-mix(in srgb, var(--status-serious) 18%, transparent); color: #f5a582; }
.tag-na { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
.tag-pending { background: transparent; color: var(--text-muted); border: 1px dashed var(--border-strong); }
.tag-campaign { background: color-mix(in srgb, var(--hue-campaign) 18%, transparent); color: #8fbdf5; }
.tag-product { background: color-mix(in srgb, var(--hue-product) 18%, transparent); color: #6fe3bb; }
.tag-listing { background: color-mix(in srgb, var(--hue-listing) 20%, transparent); color: #f6cb6b; }
.tag-delisting { background: color-mix(in srgb, var(--hue-delisting) 18%, transparent); color: #f5928d; }
.tag-other { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
.tag-mock { background: transparent; color: var(--text-muted); border: 1px dashed var(--text-muted); font-weight: 500; }
.hl-time { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

/* ---------- CEX table ---------- */
.cex-header { display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; flex-wrap: wrap; gap: 8px; }
.cex-filter { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.filter-btn {
  font-size: 11.5px; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface-1); color: var(--text-secondary); transition: all 0.12s var(--ease);
}
.filter-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
.filter-btn.active { background: var(--hue-campaign); color: var(--on-accent); border-color: var(--hue-campaign); font-weight: 600; }

.cex-tabs { display: flex; gap: 4px; padding: 0.5rem 1.5rem 0; }
.cex-tab {
  padding: 6px 12px; font-size: 12px; color: var(--text-muted); border-radius: var(--radius-sm);
  border-bottom: 2px solid transparent; transition: all 0.12s var(--ease); font-weight: 500;
}
.cex-tab:hover { color: var(--text-primary); background: var(--surface-1); }
.cex-tab.active { color: var(--text-primary); background: var(--surface-1); border-bottom-color: var(--border-strong); font-weight: 650; }

.table-wrap { overflow-x: auto; margin: 0 1.5rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-1); box-shadow: var(--shadow-card); }
.cex-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.cex-table thead th { padding: 9px 1rem; text-align: left; font-size: 10.5px; font-weight: 650; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
.cex-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s var(--ease); }
.cex-table tbody tr:last-child { border-bottom: none; }
.cex-table tbody tr:hover { background: var(--surface-2); }
.cex-table tbody td { padding: 9px 1rem; vertical-align: top; }
.cex-table .td-title { max-width: 380px; font-weight: 500; color: var(--text-primary); }
.cex-table .td-time { width: 62px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.source-pill { font-size: 10.5px; font-weight: 650; padding: 3px 8px; border-radius: 20px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-secondary); white-space: nowrap; }
.status-chip { font-size: 10.5px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
.status-chip.new { background: color-mix(in srgb, var(--hue-campaign) 16%, transparent); color: #8fbdf5; }
.status-chip.changed { background: color-mix(in srgb, var(--status-warning) 20%, transparent); color: #f6cb6b; }
.status-chip.unchanged { background: var(--surface-2); color: var(--text-muted); }
.cex-empty { padding: 2rem 1.25rem; color: var(--text-muted); font-size: 13px; text-align: center; }
.cex-footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 1rem; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--text-muted); }
.view-all-link { color: var(--hue-campaign); font-weight: 600; background: none; border: none; padding: 0; font-size: 11.5px; transition: opacity 0.12s; }
.view-all-link:hover { opacity: 0.75; }

.insights-bar { margin: 0.75rem 1.5rem 0.25rem; background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.85rem 1rem; font-size: 13px; color: var(--text-secondary); line-height: 1.65; box-shadow: var(--shadow-card); }
.insights-bar strong { color: var(--text-primary); font-weight: 650; }
.missing-source-note { padding: 6px 1.5rem 0; font-size: 11.5px; color: var(--status-warning); }

/* ---------- global cards ---------- */
.global-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 1.5rem; }
@media (max-width: 860px) { .global-grid { grid-template-columns: 1fr; } }
.global-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-card); }
.global-card-header { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 650; color: var(--text-secondary); letter-spacing: 0.01em; }
.global-full { grid-column: 1 / -1; }

.rank-row { display: flex; align-items: center; padding: 8px 1rem; border-bottom: 1px solid var(--border); gap: 12px; font-size: 12.5px; transition: background 0.1s; }
.rank-row:hover { background: var(--surface-2); }
.rank-row:last-child { border-bottom: none; }
.rank-source { width: 66px; flex-shrink: 0; }
.rank-bar-wrap { flex: 1; background: var(--surface-3); border-radius: 4px; height: 8px; overflow: hidden; }
.rank-bar { height: 8px; border-radius: 4px; background: var(--hue-campaign); transition: width 0.4s var(--ease); }
.rank-count { width: 50px; text-align: right; color: var(--text-muted); font-size: 11.5px; font-variant-numeric: tabular-nums; }
.rank-row.inactive .rank-source, .rank-row.inactive .rank-count { color: var(--text-muted); }
.rank-row.inactive .rank-bar { background: var(--border-strong); }

.missing-row { display: flex; align-items: center; padding: 8px 1rem; border-bottom: 1px solid var(--border); gap: 8px; font-size: 12.5px; }
.missing-row:last-child { border-bottom: none; }
.missing-title { flex: 1; color: var(--text-primary); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.region-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.region-table th { padding: 8px 1rem; text-align: left; font-size: 10.5px; font-weight: 650; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
.region-table td { padding: 7px 1rem; border-bottom: 1px solid var(--border); }
.region-table tr:hover { background: var(--surface-2); }
.region-table tr:last-child td { border-bottom: none; }
.region-table .td-title { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.locale-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; }
.locale-dot.en { background: var(--loc-en); } .locale-dot.fr { background: var(--loc-fr); }
.locale-dot.vn { background: var(--loc-vn); } .locale-dot.id { background: var(--loc-id); }
.locale-dot.asia { background: var(--loc-asia); }
.excl-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: color-mix(in srgb, var(--loc-asia) 22%, transparent); color: var(--loc-asia); white-space: nowrap; font-weight: 600; }

/* stacked bar chart */
.stackbar-chart { padding: 0.9rem 1rem; }
.stackbar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 11.5px; }
.stackbar-row:last-child { margin-bottom: 0; }
.stackbar-label { width: 56px; flex-shrink: 0; color: var(--text-secondary); font-weight: 600; }
.stackbar-track { flex: 1; height: 18px; border-radius: 4px; overflow: hidden; display: flex; background: var(--surface-3); }
.stackbar-seg { height: 100%; position: relative; transition: opacity 0.12s; }
.stackbar-seg:hover { opacity: 0.8; }
.stackbar-total { width: 38px; text-align: right; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.stackbar-legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 0.6rem 1rem 0.85rem; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--text-secondary); }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

.source-status-row { display: flex; align-items: center; padding: 8px 1rem; border-bottom: 1px solid var(--border); gap: 10px; font-size: 12.5px; }
.source-status-row:last-child { border-bottom: none; }
.source-status-row .status-icon { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.source-status-row .status-icon.ok { background: var(--status-good); box-shadow: 0 0 0 3px color-mix(in srgb, var(--status-good) 18%, transparent); }
.source-status-row .status-icon.broken { background: var(--status-critical); box-shadow: 0 0 0 3px color-mix(in srgb, var(--status-critical) 18%, transparent); }
.source-status-note { color: var(--text-muted); font-size: 11.5px; margin-left: auto; }

.zoomex-cats { padding: 0.9rem 1rem; display: flex; flex-wrap: wrap; gap: 7px; }

.placeholder-card { margin: 0.75rem 1.5rem 0; background: var(--surface-1); border: 1px dashed var(--border-strong); border-radius: var(--radius); padding: 1.75rem; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 13px; text-align: center; }

.footnote { padding: 1.5rem; font-size: 11.5px; color: var(--text-muted); line-height: 1.7; border-top: 1px solid var(--border); margin-top: 1.5rem; }
.footnote code { font-family: var(--font-mono); background: var(--surface-2); padding: 1px 5px; border-radius: 4px; font-size: 10.5px; }
.mock-note { display: inline-flex; align-items: center; gap: 4px; }

/* ---------- archive tab ---------- */
.archive-toolbar { display: flex; flex-direction: column; gap: 10px; padding: 0.5rem 1.5rem 0.75rem; }
.archive-filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.archive-filter-label { font-size: 11px; color: var(--text-muted); font-weight: 600; width: 68px; flex-shrink: 0; }
.archive-search {
  flex: 1; min-width: 180px; background: var(--surface-1); border: 1px solid var(--border); color: var(--text-primary);
  border-radius: 20px; padding: 6px 14px; font-size: 12.5px; transition: border-color 0.12s var(--ease);
}
.archive-search:focus { border-color: var(--hue-campaign); }
.archive-search::placeholder { color: var(--text-muted); }
.archive-summary { padding: 0 1.5rem; font-size: 12px; color: var(--text-muted); }
.archive-summary strong { color: var(--text-primary); }
.archive-pagination { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 12px 1rem; font-size: 12px; color: var(--text-secondary); }
.page-btn { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-secondary); border-radius: var(--radius-sm); padding: 5px 12px; font-size: 12px; transition: all 0.12s var(--ease); }
.page-btn:hover:not(:disabled) { border-color: var(--border-strong); color: var(--text-primary); }
.page-btn:disabled { opacity: 0.35; cursor: default; }

/* simple hover tooltip */
#tooltip {
  position: fixed; pointer-events: none; background: var(--surface-3); color: var(--text-primary); font-size: 11.5px;
  padding: 6px 10px; border-radius: 6px; z-index: 50; max-width: 260px; line-height: 1.45; opacity: 0;
  transition: opacity 0.1s; border: 1px solid var(--border-strong); box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
#tooltip.show { opacity: 1; }

.loading, .load-error { padding: 4rem 1.25rem; text-align: center; color: var(--text-muted); font-size: 13px; }
</style>

<div id="tooltip"></div>
<div id="app">
  <div class="loading" id="loadingMsg">加载看板数据…</div>
</div>

<script>
const DATA_URL = './data/dashboard.json';

const CATEGORY_ORDER = ['campaign', 'product', 'listing', 'delisting'];
const CATEGORY_LABEL = { campaign: '活动 Campaign', product: '产品 Product', listing: '上币 Listing', delisting: '下架 Delisting', other: '其他' };
const DIFF_LABEL = { missing: 'ZMX缺失', diff: 'ZMX玩法不同', same: 'ZMX已有', mixed: '混合', na: '不适用', pending: '待分析' };
const STATUS_LABEL = { new: '新增', changed: '变更', unchanged: '未变' };
const SOURCES = ['Bitunix', 'Weex', 'BingX', 'Phemex', 'Lbank'];
const LOCALE_LABEL = { EN: 'EN', FR: 'FR', VN: 'VN', ID: 'ID', 'EN-Asia': 'EN-Asia' };
const ARCHIVE_PAGE_SIZE = 50;

let DATA = null;
let state = { locale: 'EN', category: 'campaign', source: 'all' };
let archiveState = { locale: 'all', source: 'all', category: 'all', range: 'all', query: '', page: 1 };

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function mockBadge(isMock) { return isMock ? `<span class="tag tag-mock">模拟</span>` : ''; }

function showTooltip(evt, html) {
  const tip = document.getElementById('tooltip');
  tip.innerHTML = html;
  tip.classList.add('show');
  const x = evt.clientX + 14, y = evt.clientY + 14;
  tip.style.left = Math.min(x, window.innerWidth - 270) + 'px';
  tip.style.top = y + 'px';
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }

async function loadData() {
  try {
    const res = await fetch(DATA_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    render();
  } catch (err) {
    document.getElementById('app').innerHTML =
      `<div class="load-error">数据加载失败：${esc(err.message)}<br>` +
      `请确认 docs/data/dashboard.json 已通过 python -m src.dashboard 生成。</div>`;
  }
}

function render() {
  const app = document.getElementById('app');
  const locales = DATA.locales;
  app.innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">竞品情报看板</span>
        <span class="topbar-date">${esc(DATA.meta.as_of_date)}</span>
      </div>
      <div class="topbar-right">
        <span class="status-dot"></span>
        <span>数据生成于 ${esc(DATA.meta.generated_at)}</span>
      </div>
    </div>
    <div class="locale-tabs" id="localeTabs">
      ${locales.map(l => `<div class="locale-tab" data-tab="${l}">${esc(LOCALE_LABEL[l] || l)}</div>`).join('')}
      <div class="tabs-divider"></div>
      <div class="locale-tab accent-tab" data-tab="archive">全量</div>
      <div class="locale-tab global" data-tab="global">全局视角</div>
    </div>
    <div id="paneHost"></div>
    <div class="footnote">
      竞品情报平台 · SQLite 为唯一真相源，本页由 <code>python -m src.dashboard</code> 从数据库快照静态导出，
      不含实时查询。标注 <span class="mock-note"><span class="tag tag-mock">模拟</span></span> 的条目是本次演示为填补
      insights 缺口生成的占位内容（非真实 LLM 分析结果），详见项目 CLAUDE.md「Phase 7」。
      共 ${DATA.meta.insights_total} 个分析批次（真实 ${DATA.meta.insights_total - DATA.meta.insights_mock} / 模拟 ${DATA.meta.insights_mock}），
      Zoomex 基线累计 ${DATA.meta.zoomex_baseline_total} 条。区域 tab 只展示最新一批更新，完整历史数据请见「全量」tab。
    </div>
  `;

  document.getElementById('localeTabs').addEventListener('click', e => {
    const t = e.target.closest('[data-tab]');
    if (!t) return;
    state.locale = t.dataset.tab;
    document.querySelectorAll('.locale-tab').forEach(x => x.classList.toggle('active', x.dataset.tab === state.locale));
    renderActivePane();
  });
  document.querySelectorAll('.locale-tab')[0].classList.add('active');
  renderActivePane();
}

function switchToArchive(locale, category) {
  archiveState = { locale: locale || 'all', source: 'all', category: category || 'all', range: 'all', query: '', page: 1 };
  state.locale = 'archive';
  document.querySelectorAll('.locale-tab').forEach(x => x.classList.toggle('active', x.dataset.tab === 'archive'));
  renderActivePane();
}

function renderActivePane() {
  const host = document.getElementById('paneHost');
  if (state.locale === 'global') {
    host.innerHTML = renderGlobalPane();
    wireGlobalPane();
  } else if (state.locale === 'archive') {
    host.innerHTML = renderArchivePane();
    wireArchivePane();
  } else if (state.locale === 'EN-Asia') {
    host.innerHTML = renderAsiaPane();
  } else {
    host.innerHTML = renderLocalePane(state.locale);
    wireLocalePane();
  }
}

/* ---------------- per-locale pane ---------------- */

function renderAnalysisBlocks(locale) {
  const blocks = DATA.analysis_blocks[locale] || [];
  if (!blocks.length) return '';
  const byCat = {};
  blocks.forEach(b => { (byCat[b.category] = byCat[b.category] || []).push(b); });

  return `
    <div>
      <div class="section-label">分类分析简报</div>
      <div class="analysis-groups">
        ${CATEGORY_ORDER.filter(c => byCat[c]).map(c => `
          <div class="analysis-group">
            <div class="analysis-group-title">
              <span class="tag tag-${c}">${CATEGORY_LABEL[c]}</span>
              <span class="analysis-group-count">${byCat[c].length} 个批次</span>
            </div>
            ${byCat[c].map(b => {
              // 只保留一份连续文本（LLM 对这个批次的原始输出：summary + zmx 对比结论），
              // 不再拆成两个视觉上分离的框——之前的版本让两段读起来像重复内容。
              const combined = [b.summary, b.zmx_diff].filter(Boolean).join('\n\n');
              const isLong = combined.length > 140;
              return `
              <div class="analysis-card">
                <div class="analysis-card-head">
                  <span class="hl-source">${esc(b.source)}</span>
                  <span style="font-size:11.5px;color:var(--text-muted)">${b.article_count} 篇公告</span>
                  ${b.is_locale_derived ? `<span class="tag tag-na">复用自 EN 分析</span>` : ''}
                  ${mockBadge(b.is_mock)}
                  <span style="flex:1"></span>
                  ${b.priority ? `<span class="tag tag-${b.priority === '高' ? 'missing' : (b.priority === '中' ? 'diff' : 'na')}">优先级 ${esc(b.priority)}</span>` : ''}
                  <span class="tag tag-${b.diff_tag}">${esc(DIFF_LABEL[b.diff_tag] || b.diff_tag)}</span>
                </div>
                ${combined ? `<div class="analysis-body ${isLong ? 'clamped' : ''}">${esc(combined)}</div>` : ''}
                ${isLong ? `<button class="analysis-toggle" data-toggle>展开全文 ▾</button>` : ''}
              </div>
            `;}).join('')}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

  const digest = DATA.daily_digest[locale] || { text: '', source: 'stats_fallback' };
  const missingSourceNames = ov.sources_list.filter(s => !(DATA.sources[s] && DATA.sources[s].today > 0));

  return `
    <div class="digest-hero">
      <div class="digest-hero-label">今日 Summary · ${esc(locale)}${
        digest.source === 'stats_fallback'
          ? `<span class="digest-badge">占位符 · 待接入 LLM 生成</span>`
          : `<span class="digest-badge" style="color:var(--hue-campaign);border-color:var(--hue-campaign);border-style:solid">LLM 生成</span>`
      }</div>
      <div class="digest-hero-text">${esc(digest.text)}</div>
      ${digest.priority_focus ? `<div class="digest-focus">→ ${esc(digest.priority_focus)}</div>` : ''}
    </div>

    ${renderAnalysisBlocks(locale)}

    <div>
      <div class="section-label">最新一批概览</div>
      <div class="overview-grid">
        <div class="stat-card"><div class="stat-label">抓取</div><div class="stat-value">${ov.fetched_today}</div><div class="stat-delta">${ov.sources_active}/${ov.sources_configured} 源 · ${esc(locale)}</div></div>
        <div class="stat-card"><div class="stat-label">新增</div><div class="stat-value accent">${ov.new_count}</div><div class="stat-delta">status = new</div></div>
        <div class="stat-card"><div class="stat-label">内容变更</div><div class="stat-value warn">${ov.changed_count}</div><div class="stat-delta">status = changed</div></div>
        <div class="stat-card"><div class="stat-label">地区独占</div><div class="stat-value">${ov.region_exclusive_count}</div><div class="stat-delta">仅本 locale 出现</div></div>
        <div class="stat-card"><div class="stat-label">ZMX 缺失·高优</div><div class="stat-value danger">${ov.zmx_missing_high}</div><div class="stat-delta">批次数</div></div>
        <div class="stat-card"><div class="stat-label">推送候选</div><div class="stat-value">${ov.push_candidates}</div><div class="stat-delta">按规则预览 · Phase 6 未上线</div></div>
      </div>
      ${missingSourceNames.length ? `<div class="missing-source-note">⚠ ${missingSourceNames.map(esc).join(', ')} 本次无数据</div>` : ''}
    </div>

    <div>
      <div class="section-label">今日重点 · priority 高</div>
      <div class="highlights-list">
        ${hl.length ? hl.map(h => `
          <div class="highlight-card ${h.diff_tag === 'missing' ? 'pri-high' : ''}">
            <div class="priority-dot" style="${h.diff_tag === 'missing' ? '' : 'background:var(--status-warning);box-shadow:0 0 0 3px color-mix(in srgb, var(--status-warning) 18%, transparent)'}"></div>
            <div class="hl-source">${esc(h.source)}</div>
            <div class="hl-body">
              <div class="hl-title">${esc(h.title)}</div>
              ${h.summary ? `<div class="hl-summary">${esc(h.summary)}</div>` : ''}
              <div class="hl-meta">
                <span class="tag tag-${h.diff_tag}">${esc(DIFF_LABEL[h.diff_tag] || h.diff_tag)}</span>
                <span class="tag tag-${h.category}">${esc(CATEGORY_LABEL[h.category] || h.category)}</span>
                ${mockBadge(h.is_mock)}
                <span class="hl-time">${h.status === 'changed' ? '变更 · ' : ''}${esc(h.time)}</span>
              </div>
            </div>
          </div>
        `).join('') : `<div class="cex-empty">本 locale 今日无高优先级重点</div>`}
      </div>
    </div>

    <div>
      <div class="cex-header">
        <div class="section-label" style="padding:0">最新动态</div>
        <div class="cex-filter" id="sourceFilter">

          ${SOURCES.map(s => `<button class="filter-btn" data-src="${s}">${s}</button>`).join('')}
        </div>
      </div>
      <div class="cex-tabs" id="cexTabs">
        ${CATEGORY_ORDER.map((c, i) => `<div class="cex-tab ${i === 0 ? 'active' : ''}" data-cat="${c}">${CATEGORY_LABEL[c]} <span style="color:var(--text-muted);font-weight:400">(${cexCounts[c] || 0})</span></div>`).join('')}
      </div>
      <div class="table-wrap">
        <table class="cex-table">
          <thead><tr><th style="width:90px">来源</th><th>标题</th><th class="td-time">时间</th><th style="width:110px">差异</th><th style="width:76px">状态</th></tr></thead>

      变更 <strong>${ov.changed_count}</strong> 条，覆盖 <strong>${ov.sources_active}/${ov.sources_configured}</strong> 个竞品源。
      ZMX 缺失高优先级批次 <strong>${ov.zmx_missing_high}</strong> 个，地区独占 <strong>${ov.region_exclusive_count}</strong> 条，
      按现有规则预览可推送 <strong>${ov.push_candidates}</strong> 条（推送引擎 Phase 6 尚未上线，此数字仅供参考）。
      本页只展示最新一批的 digest，完整历史请见「全量」tab。
    </div>
  `;
}

function wireLocalePane() {
  state.category = CATEGORY_ORDER[0];
  state.source = 'all';
  document.getElementById('cexTabs').addEventListener('click', e => {
    const t = e.target.closest('[data-cat]');
    if (!t) return;
    document.querySelectorAll('.cex-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.category = t.dataset.cat;
    renderCexBody();
  });
  document.getElementById('sourceFilter').addEventListener('click', e => {
    const t = e.target.closest('[data-src]');
    if (!t) return;
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.source = t.dataset.src;
    renderCexBody();
  });
  document.getElementById('viewAllBtn').addEventListener('click', () => {
    switchToArchive(state.locale, state.category);
  });
  document.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const body = btn.previousElementSibling;
      const collapsed = body.classList.toggle('clamped');
      btn.textContent = collapsed ? '展开全文 ▾' : '收起 ▴';
    });
  });
  renderCexBody();
}

function renderCexBody() {
  const rows = (DATA.cex_tables[state.locale] || {})[state.category] || [];
  const totalForCat = (DATA.cex_counts[state.locale] || {})[state.category] || 0;
  const filtered = state.source === 'all' ? rows : rows.filter(r => r.source === state.source);
  const body = document.getElementById('cexBody');
  body.innerHTML = filtered.length ? filtered.map(r => `
    <tr>
      <td><span class="source-pill">${esc(r.source)}</span></td>
      <td class="td-title">${esc(r.title)} ${mockBadge(r.is_mock)}</td>
      <td class="td-time">${esc(r.time)}</td>
      <td><span class="tag tag-${r.diff_tag}">${esc(DIFF_LABEL[r.diff_tag] || r.diff_tag)}</span></td>
      <td><span class="status-chip ${r.status}">${esc(STATUS_LABEL[r.status] || r.status)}</span></td>
    </tr>
  `).join('') : `<tr><td colspan="5" class="cex-empty">无匹配数据</td></tr>`;
  document.getElementById('cexFooterCount').textContent =
    `本类目共 ${totalForCat} 条，当前展示最新 ${filtered.length} 条`;
}

function wireGlobalPane() {
  const dist = DATA.category_distribution;
  const chart = document.getElementById('stackChart');
  chart.innerHTML = dist.map(row => {
    const total = CATEGORY_ORDER.reduce((s,c) => s + row[c], 0) + row.other;
    const segs = [...CATEGORY_ORDER, 'other'].map(c => {
      const n = row[c];
      if (!n) return '';
      const pct = total ? (100 * n / total) : 0;
      const color = c === 'other' ? 'var(--text-muted)' : `var(--hue-${c})`;
      return `<div class="stackbar-seg" data-tip="${esc(CATEGORY_LABEL[c])}：${n} 条" style="width:${pct}%;background:${color};margin-right:${c === 'other' ? 0 : '2px'}"></div>`;
    }).join('');
    return `<div class="stackbar-row">
      <div class="stackbar-label">${esc(row.source)}</div>
      <div class="stackbar-track">${total ? segs : ''}</div>
      <div class="stackbar-total">${total}</div>
    </div>`;
  }).join('');

  document.querySelectorAll('[data-tip]').forEach(el => {
    el.addEventListener('mousemove', e => showTooltip(e, el.dataset.tip));
    el.addEventListener('mouseleave', hideTooltip);
  });
}

/* ---------------- archive pane (full history, filterable) ---------------- */

function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }

function archiveFilteredRows() {
  const rows = DATA.archive.rows;
  const anchor = DATA.meta.as_of_date;
  const rangeDays = { '30d': 30, '90d': 90, '365d': 365 }[archiveState.range];
  const q = archiveState.query.trim().toLowerCase();
  return rows.filter(r => {
    if (archiveState.locale !== 'all' && r.locale !== archiveState.locale) return false;
    if (archiveState.source !== 'all' && r.source !== archiveState.source) return false;
    if (archiveState.category !== 'all' && r.category !== archiveState.category) return false;
    if (rangeDays && (!r.date || daysBetween(r.date, anchor) > rangeDays)) return false;
    if (q && !r.title.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderArchivePane() {
  const a = DATA.archive;
  return `
    <div class="archive-toolbar">
      <div class="archive-filter-row">
        <span class="archive-filter-label">地区</span>
        <button class="filter-btn active" data-f="locale" data-v="all">全部</button>
        ${DATA.locales.map(l => `<button class="filter-btn" data-f="locale" data-v="${l}">${esc(LOCALE_LABEL[l] || l)}</button>`).join('')}
      </div>
      <div class="archive-filter-row">
        <span class="archive-filter-label">时间</span>
        <button class="filter-btn active" data-f="range" data-v="all">全部时间</button>
        <button class="filter-btn" data-f="range" data-v="30d">近 30 天</button>
        <button class="filter-btn" data-f="range" data-v="90d">近 90 天</button>
        <button class="filter-btn" data-f="range" data-v="365d">近 1 年</button>
        <span style="font-size:11px;color:var(--text-muted);margin-left:4px">数据跨度 ${esc(a.date_min)} ~ ${esc(a.date_max)}</span>
      </div>
      <div class="archive-filter-row">
        <span class="archive-filter-label">来源</span>
        <button class="filter-btn active" data-f="source" data-v="all">全部</button>
        ${SOURCES.map(s => `<button class="filter-btn" data-f="source" data-v="${s}">${s}</button>`).join('')}
      </div>
      <div class="archive-filter-row">
        <span class="archive-filter-label">分类</span>
        <button class="filter-btn active" data-f="category" data-v="all">全部</button>
        ${CATEGORY_ORDER.map(c => `<button class="filter-btn" data-f="category" data-v="${c}">${CATEGORY_LABEL[c]}</button>`).join('')}
        <button class="filter-btn" data-f="category" data-v="other">其他</button>
        <input type="text" class="archive-search" id="archiveSearch" placeholder="搜索标题…">
      </div>
    </div>
    <div class="archive-summary" id="archiveSummary"></div>
    <div class="table-wrap" style="margin-top:8px">
      <table class="cex-table">
        <thead><tr><th style="width:90px">来源</th><th style="width:64px">地区</th><th>标题</th><th style="width:110px">分类</th><th class="td-time" style="width:88px">日期</th><th style="width:110px">差异</th><th style="width:76px">状态</th></tr></thead>
        <tbody id="archiveBody"></tbody>
      </table>
    </div>
    <div class="archive-pagination" id="archivePagination"></div>
  `;
}

function renderArchiveTable() {
  const filtered = archiveFilteredRows();
  const totalPages = Math.max(1, Math.ceil(filtered.length / ARCHIVE_PAGE_SIZE));
  archiveState.page = Math.min(archiveState.page, totalPages);
  const start = (archiveState.page - 1) * ARCHIVE_PAGE_SIZE;
  const pageRows = filtered.slice(start, start + ARCHIVE_PAGE_SIZE);

  document.getElementById('archiveSummary').innerHTML =
    `共 <strong>${filtered.length}</strong> 条匹配结果（全量归档共 ${DATA.archive.total} 条）`;

  document.getElementById('archiveBody').innerHTML = pageRows.length ? pageRows.map(r => `
    <tr>
      <td><span class="source-pill">${esc(r.source)}</span></td>
      <td>${esc(LOCALE_LABEL[r.locale] || r.locale)}</td>
      <td class="td-title">${esc(r.title)} ${mockBadge(r.is_mock)}</td>
      <td><span class="tag tag-${r.category}">${esc(CATEGORY_LABEL[r.category] || r.category)}</span></td>
      <td class="td-time">${esc(r.date || '—')}</td>
      <td><span class="tag tag-${r.diff_tag}">${esc(DIFF_LABEL[r.diff_tag] || r.diff_tag)}</span></td>
      <td><span class="status-chip ${r.status}">${esc(STATUS_LABEL[r.status] || r.status)}</span></td>
    </tr>
  `).join('') : `<tr><td colspan="7" class="cex-empty">无匹配数据，试试放宽筛选条件</td></tr>`;

  document.getElementById('archivePagination').innerHTML = `
    <button class="page-btn" id="pagePrev" ${archiveState.page <= 1 ? 'disabled' : ''}>← 上一页</button>
    <span>第 ${archiveState.page} / ${totalPages} 页</span>
    <button class="page-btn" id="pageNext" ${archiveState.page >= totalPages ? 'disabled' : ''}>下一页 →</button>
  `;
  const prev = document.getElementById('pagePrev'), next = document.getElementById('pageNext');
  if (prev) prev.addEventListener('click', () => { archiveState.page--; renderArchiveTable(); });
  if (next) next.addEventListener('click', () => { archiveState.page++; renderArchiveTable(); });
}

function wireArchivePane() {
  document.querySelectorAll('[data-f]').forEach(btn => {
    const field = btn.dataset.f, val = btn.dataset.v;
    if (archiveState[field] === val) btn.classList.add('active'); else btn.classList.remove('active');
  });
  document.querySelectorAll('.archive-filter-row').forEach(row => {
    row.addEventListener('click', e => {
      const t = e.target.closest('[data-f]');
      if (!t) return;
      const field = t.dataset.f;
      row.querySelectorAll(`[data-f="${field}"]`).forEach(b => b.classList.remove('active'));
      t.classList.add('active');
      archiveState[field] = t.dataset.v;
      archiveState.page = 1;
      renderArchiveTable();
    });
  });
  const search = document.getElementById('archiveSearch');
  search.value = archiveState.query;
  let debounce;
  search.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      archiveState.query = search.value;
      archiveState.page = 1;
      renderArchiveTable();
    }, 200);
  });
  renderArchiveTable();
}

loadData();
</script>
