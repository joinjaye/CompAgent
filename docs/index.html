<!doctype html>
<title>竞品情报看板 · ZMX Competitor Intel</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  color-scheme: dark;
  --surface-0: #0a0b0d;
  --surface-1: #131418;
  --surface-2: #1b1d22;
  --surface-3: #24262c;
  --text-primary: #f3f4f6;
  --text-secondary: #a8adb8;
  --text-muted: #6b7180;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.16);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow-card: 0 1px 2px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03) inset;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);

  --hue-campaign: #5b9dee;
  --hue-product: #2fd39a;
  --hue-listing: #f0b429;
  --hue-delisting: #f0645f;

  --status-good: #2fd39a;
  --status-warning: #f0b429;
  --status-serious: #f0895f;
  --status-critical: #f0645f;

  --loc-en: #5b9dee;
  --loc-fr: #9b8ce8;
  --loc-vn: #f0895f;
  --loc-id: #2fd39a;

  --on-accent: #071018;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--surface-0); }
body {
  font-family: var(--font-sans); color: var(--text-primary); background: var(--surface-0);
  max-width: 1120px; margin: 0 auto; padding-bottom: 4rem;
  -webkit-font-smoothing: antialiased;
}
@media (max-width: 640px) {
  body { padding-bottom: 2rem; }
  .topbar { padding: .85rem 1rem; align-items: flex-start; }
  .topbar-right { display: none; }
  .category-tabs, .overview-grid, .filter-bar, .market-tabs, .search-toolbar { padding-left: 1rem; padding-right: 1rem; }
  .table-wrap, .trend-card, .insight-card, .rank-card { margin-left: 1rem; margin-right: 1rem; }
  .section-label { padding-left: 1rem; padding-right: 1rem; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
}
button, input, select { font-family: inherit; }
button { cursor: pointer; }
a { color: inherit; }
::selection { background: color-mix(in srgb, var(--hue-campaign) 35%, transparent); }
*:focus-visible { outline: 2px solid var(--hue-campaign); outline-offset: 2px; border-radius: 3px; }

/* ---------- top bar ---------- */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 1.5rem; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: color-mix(in srgb, var(--surface-0) 88%, transparent);
  backdrop-filter: blur(10px); z-index: 10;
}
.topbar-left { display: flex; align-items: baseline; gap: 12px; }
.topbar-title { font-size: 15px; font-weight: 650; letter-spacing: -0.01em; }
.topbar-date { font-size: 12.5px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.topbar-right { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--status-good); box-shadow: 0 0 0 3px color-mix(in srgb, var(--status-good) 20%, transparent); }

/* ---------- category tabs (top-level nav) ---------- */
.category-tabs { display: flex; gap: 2px; padding: 0.6rem 1.5rem 0; overflow-x: auto; }
.category-tab {
  padding: 7px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer;
  white-space: nowrap; user-select: none; border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  border-bottom: 2px solid transparent; transition: color 0.15s var(--ease), background 0.15s var(--ease);
  font-weight: 500;
}
.category-tab:hover { color: var(--text-primary); background: var(--surface-1); }
.category-tab.active { color: var(--hue-campaign); border-bottom-color: var(--hue-campaign); background: var(--surface-1); font-weight: 650; }

/* ---------- section scaffolding ---------- */
.section-label { font-size: 11px; font-weight: 650; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; padding: 1.5rem 1.5rem 0.6rem; }
.tab-pane { display: none; flex-direction: column; gap: 0.35rem; animation: fadeIn 0.18s var(--ease); }
.tab-pane.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }

/* ---------- quick jump ---------- */
.quick-jump { display: flex; gap: 8px; padding: 0.4rem 1.5rem 0; flex-wrap: wrap; }
.quick-jump-btn { font-size: 11.5px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface-1); color: var(--text-secondary); transition: all 0.12s var(--ease); }
.quick-jump-btn:hover { border-color: var(--hue-campaign); color: var(--hue-campaign); }

/* ---------- stat / chip cards ---------- */
.overview-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; padding: 0 1.5rem; }
@media (max-width: 860px) { .overview-grid { grid-template-columns: repeat(2, minmax(0,1fr)); } }
.stat-card {
  background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.85rem 1rem; box-shadow: var(--shadow-card); transition: border-color 0.15s var(--ease);
}
.stat-card:hover { border-color: var(--border-strong); }
.stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
.stat-value { font-size: 24px; font-weight: 650; line-height: 1.1; letter-spacing: -0.02em; font-variant-numeric: proportional-nums; }
.stat-value.accent { color: var(--hue-campaign); }
.stat-value.warn { color: var(--status-warning); }
.stat-value.danger { color: var(--status-critical); }
.stat-delta { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
.chip-diffs { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
.chip-diffs .tag { font-size: 10px; padding: 2px 7px; }
.date-control { display:flex; align-items:center; gap:8px; color:var(--text-muted); font-size:12px; }
.date-input { color:var(--text-primary); background:var(--surface-1); border:1px solid var(--border); border-radius:6px; padding:5px 8px; }
.insight-card { margin:0 1.5rem; padding:1rem 1.1rem; background:linear-gradient(135deg, rgba(91,157,238,.12), var(--surface-1)); border:1px solid rgba(91,157,238,.28); border-radius:var(--radius); color:var(--text-secondary); font-size:13px; line-height:1.7; }
.trend-card { margin:0 1.5rem; padding:1rem; background:var(--surface-1); border:1px solid var(--border); border-radius:var(--radius); }
.trend-bars { height:180px; display:flex; align-items:flex-end; gap:8px; border-bottom:1px solid var(--border); }
.trend-day { min-width:38px; flex:1; height:100%; display:flex; align-items:flex-end; justify-content:center; gap:2px; position:relative; }
.trend-bar { width:22%; min-height:2px; border-radius:3px 3px 0 0; }
.trend-bar.campaign { background:var(--hue-campaign); }.trend-bar.product { background:var(--hue-product); }.trend-bar.listing { background:var(--hue-listing); }
.trend-labels { display:flex; gap:8px; margin-top:7px; color:var(--text-muted); font-size:10px; }.trend-labels span { flex:1; text-align:center; min-width:38px; }
.trend-legend { display:flex; gap:16px; margin-bottom:10px; font-size:11px; color:var(--text-secondary); }
.legend-dot { width:7px; height:7px; display:inline-block; border-radius:50%; margin-right:5px; }
.summary-table td strong { font-size:16px; }
.overview-actions { display:flex; align-items:center; justify-content:space-between; padding:.5rem 1.5rem 0; flex-wrap:wrap; gap:8px; }
.rule-guide { margin:.8rem 1.5rem 0; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface-1); color:var(--text-secondary); font-size:12px; }
.rule-guide summary { cursor:pointer; min-height:44px; display:flex; align-items:center; padding:0 1rem; color:var(--text-primary); font-weight:650; }
.rule-guide-body { border-top:1px solid var(--border); padding:.8rem 1rem; line-height:1.65; display:grid; gap:5px; }
.rule-guide code { color:var(--hue-campaign); font-family:var(--font-mono); }
.freshness { display:inline-flex; align-items:center; gap:6px; padding:4px 9px; border:1px solid var(--border); border-radius:20px; color:var(--text-secondary); font-size:11px; }
.source-link { color:var(--hue-campaign); font-weight:650; white-space:nowrap; }

/* ---------- activity ranking (reused on Overview) ---------- */
.rank-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius); margin: 0 1.5rem; box-shadow: var(--shadow-card); overflow: hidden; }
.rank-row { display: flex; align-items: center; padding: 8px 1rem; border-bottom: 1px solid var(--border); gap: 12px; font-size: 12.5px; transition: background 0.1s; }
.rank-row:hover { background: var(--surface-2); }
.rank-row:last-child { border-bottom: none; }
.rank-source { width: 66px; flex-shrink: 0; }
.rank-bar-wrap { flex: 1; background: var(--surface-3); border-radius: 4px; height: 8px; overflow: hidden; }
.rank-bar { height: 8px; border-radius: 4px; background: var(--hue-campaign); transition: width 0.4s var(--ease); }
.rank-count { width: 50px; text-align: right; color: var(--text-muted); font-size: 11.5px; font-variant-numeric: tabular-nums; }
.rank-row.inactive .rank-source, .rank-row.inactive .rank-count { color: var(--text-muted); }
.rank-row.inactive .rank-bar { background: var(--border-strong); }

/* ---------- detail cards (Campaign / Product / highlights) ---------- */
.detail-list { padding: 0 1.5rem; display: flex; flex-direction: column; gap: 10px; }
.detail-card {
  background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.9rem 1.05rem; box-shadow: var(--shadow-card); transition: border-color 0.15s var(--ease);
}
.detail-card:hover { border-color: var(--border-strong); }
.detail-card.accent-missing { border-left: 3px solid var(--status-critical); }
.detail-card-head { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 8px; }
.detail-title { font-size: 13.5px; font-weight: 600; overflow-wrap: anywhere; line-height: 1.4; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.detail-title a { text-decoration: none; }
.detail-title a:hover { text-decoration: underline; }
.detail-body { font-size: 12.5px; color: var(--text-secondary); line-height: 1.6; white-space: pre-line; }
.detail-body.clamped { display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.analysis-toggle {
  margin-top: 7px; background: none; border: none; padding: 0; font-size: 11.5px;
  color: var(--hue-campaign); font-weight: 600; transition: opacity 0.12s;
}
.analysis-toggle:hover { opacity: 0.75; }
.follow-up { margin-top: 8px; font-size: 12.5px; color: var(--hue-campaign); font-weight: 600; line-height: 1.5; }
.detail-meta { margin-top: 8px; font-size: 11px; color: var(--text-muted); display: flex; gap: 10px; align-items: center; }
.detail-meta a { color: var(--hue-campaign); font-weight: 600; }

/* ---------- priority ---------- */
.priority-high { background: color-mix(in srgb, var(--status-critical) 18%, transparent); color: #ff9d99; }
.priority-medium { background: color-mix(in srgb, var(--status-warning) 20%, transparent); color: #f6cb6b; }
.priority-low { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }

/* ---------- highlight cards (Overview) ---------- */
.highlight-card {
  background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.85rem 1rem; display: flex; align-items: flex-start; gap: 12px;
  box-shadow: var(--shadow-card); transition: border-color 0.15s var(--ease);
}
.highlight-card:hover { border-color: var(--border-strong); }
.highlight-card.accent-missing { border-left: 3px solid var(--status-critical); }
.hl-source { font-size: 11px; font-weight: 650; background: color-mix(in srgb, var(--hue-campaign) 16%, transparent); color: var(--hue-campaign); padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
.hl-body { flex: 1; min-width: 0; }
.hl-title { font-size: 13.5px; font-weight: 600; overflow-wrap: anywhere; line-height: 1.4; }
.hl-title a { text-decoration: none; }
.hl-title a:hover { text-decoration: underline; }
.hl-summary { font-size: 12.5px; color: var(--text-secondary); margin-top: 4px; line-height: 1.55; }
.hl-meta { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.hl-time { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

.tag { font-size: 10.5px; padding: 3px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; letter-spacing: 0.01em; }
.tag-missing { background: color-mix(in srgb, var(--status-critical) 18%, transparent); color: #ff9d99; }
.tag-diff { background: color-mix(in srgb, var(--status-warning) 20%, transparent); color: #f6cb6b; }
.tag-same { background: color-mix(in srgb, var(--status-good) 16%, transparent); color: var(--status-good); }
.tag-mixed { background: color-mix(in srgb, var(--status-serious) 18%, transparent); color: #f5a582; }
.tag-na { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
.tag-pending { background: transparent; color: var(--text-muted); border: 1px dashed var(--border-strong); }
.tag-campaign { background: color-mix(in srgb, var(--hue-campaign) 18%, transparent); color: #8fbdf5; }
.tag-product { background: color-mix(in srgb, var(--hue-product) 18%, transparent); color: #6fe3bb; }
.tag-listing { background: color-mix(in srgb, var(--hue-listing) 20%, transparent); color: #f6cb6b; }
.tag-delisting { background: color-mix(in srgb, var(--hue-delisting) 18%, transparent); color: #f5928d; }
.tag-other { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
.tag-mock { background: transparent; color: var(--text-muted); border: 1px dashed var(--text-muted); font-weight: 500; }
.tag-llm { background: color-mix(in srgb, var(--status-good) 18%, transparent); color: var(--status-good); border: 1px solid var(--status-good); }

/* ---------- filter bar (shared: Campaign/Product/Listing/Markets/Search) ---------- */
.filter-bar { display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; flex-wrap: wrap; gap: 8px; }
.filter-group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.filter-btn {
  font-size: 11.5px; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface-1); color: var(--text-secondary); transition: all 0.12s var(--ease);
}
.filter-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
.filter-btn.active { background: var(--hue-campaign); color: var(--on-accent); border-color: var(--hue-campaign); font-weight: 600; }
.filter-btn:disabled { opacity: 0.35; cursor: default; }

/* ---------- data table (Listing / Search / Markets matrix) ---------- */
.table-wrap { overflow-x: auto; margin: 0.6rem 1.5rem 0; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-1); box-shadow: var(--shadow-card); }
.data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.data-table thead th { padding: 9px 1rem; text-align: left; font-size: 10.5px; font-weight: 650; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
.data-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s var(--ease); }
.data-table tbody tr:last-child { border-bottom: none; }
.data-table tbody tr:hover { background: var(--surface-2); }
.data-table tbody tr.row-accent-missing { box-shadow: inset 3px 0 0 var(--status-critical); }
.data-table tbody td { padding: 9px 1rem; vertical-align: top; }
.data-table .td-title { max-width: 380px; font-weight: 500; color: var(--text-primary); }
.data-table .td-title a { text-decoration: none; } .data-table .td-title a:hover { text-decoration: underline; }
.data-table .td-time { width: 76px; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
.source-pill { font-size: 10.5px; font-weight: 650; padding: 3px 8px; border-radius: 20px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-secondary); white-space: nowrap; }
.status-chip { font-size: 10.5px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
.status-chip.new { background: color-mix(in srgb, var(--hue-campaign) 16%, transparent); color: #8fbdf5; }
.status-chip.changed { background: color-mix(in srgb, var(--status-warning) 20%, transparent); color: #f6cb6b; }
.status-chip.unchanged { background: var(--surface-2); color: var(--text-muted); }
.table-empty { padding: 2rem 1.25rem; color: var(--text-muted); font-size: 13px; text-align: center; }
.table-footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 1rem; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--text-muted); }

.excl-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: color-mix(in srgb, var(--loc-asia) 22%, transparent); color: var(--loc-asia); white-space: nowrap; font-weight: 600; }
.locale-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; }
.locale-dot.en { background: var(--loc-en); } .locale-dot.fr { background: var(--loc-fr); }
.locale-dot.vn { background: var(--loc-vn); } .locale-dot.id { background: var(--loc-id); }

/* ---------- Markets ---------- */
.market-tabs { display: flex; gap: 4px; padding: 0.5rem 1.5rem 0; flex-wrap: wrap; }
.market-tab {
  padding: 6px 14px; font-size: 12px; color: var(--text-muted); border-radius: var(--radius-sm);
  border-bottom: 2px solid transparent; transition: all 0.12s var(--ease); font-weight: 500;
}
.market-tab:hover { color: var(--text-primary); background: var(--surface-1); }
.market-tab.active { color: var(--text-primary); background: var(--surface-1); border-bottom-color: var(--border-strong); font-weight: 650; }
.market-tab.disabled { color: var(--border-strong); cursor: default; }
.market-tab.disabled:hover { background: none; color: var(--border-strong); }
.market-summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; padding: 0.75rem 1.5rem 0; }
@media (max-width: 860px) { .market-summary-grid { grid-template-columns: 1fr; } }
.market-section { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-card); overflow: hidden; }
.market-section-head { padding: 0.6rem 0.9rem; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 650; color: var(--text-secondary); display: flex; align-items: center; justify-content: space-between; }
.market-section-body { padding: 0.6rem 0.9rem; display: flex; flex-direction: column; gap: 8px; }
.market-item { font-size: 12px; line-height: 1.5; }
.market-item-title { color: var(--text-primary); font-weight: 500; }
.market-empty { color: var(--text-muted); font-size: 12px; padding: 0.4rem 0; }

.region-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.region-table th { padding: 8px 1rem; text-align: left; font-size: 10.5px; font-weight: 650; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
.region-table td { padding: 7px 1rem; border-bottom: 1px solid var(--border); }
.region-table tr:hover { background: var(--surface-2); }
.region-table tr:last-child td { border-bottom: none; }
.region-table .td-title { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }

.baseline-card { margin: 0.75rem 1.5rem 0; background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.85rem 1rem; font-size: 12.5px; color: var(--text-secondary); line-height: 1.65; box-shadow: var(--shadow-card); }
.baseline-card strong { color: var(--text-primary); }
.zoomex-cats { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }

/* ---------- Search ---------- */
.search-toolbar { display: flex; flex-direction: column; gap: 10px; padding: 0.5rem 1.5rem 0.75rem; }
.search-filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.search-filter-label { font-size: 11px; color: var(--text-muted); font-weight: 600; width: 68px; flex-shrink: 0; }
.search-input {
  flex: 1; min-width: 180px; background: var(--surface-1); border: 1px solid var(--border); color: var(--text-primary);
  border-radius: 20px; padding: 6px 14px; font-size: 12.5px; transition: border-color 0.12s var(--ease);
}
.search-input:focus { border-color: var(--hue-campaign); }
.search-input::placeholder { color: var(--text-muted); }
.search-summary { padding: 0 1.5rem; font-size: 12px; color: var(--text-muted); }
.search-summary strong { color: var(--text-primary); }
.pagination { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 12px 1rem; font-size: 12px; color: var(--text-secondary); }
.page-btn { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-secondary); border-radius: var(--radius-sm); padding: 5px 12px; font-size: 12px; transition: all 0.12s var(--ease); }
.page-btn:hover:not(:disabled) { border-color: var(--border-strong); color: var(--text-primary); }
.page-btn:disabled { opacity: 0.35; cursor: default; }

.footnote { padding: 1.5rem; font-size: 11.5px; color: var(--text-muted); line-height: 1.7; border-top: 1px solid var(--border); margin-top: 1.5rem; }
.footnote code { font-family: var(--font-mono); background: var(--surface-2); padding: 1px 5px; border-radius: 4px; font-size: 10.5px; }
.mock-note { display: inline-flex; align-items: center; gap: 4px; }

.loading, .load-error { padding: 4rem 1.25rem; text-align: center; color: var(--text-muted); font-size: 13px; }

/* ---------- push view (compact per-locale digest, URL-only: ?view=push&locale=EN) ---------- */
/* 不是六个顶层 tab 之一，专门给 src/dashboard/screenshot.py 截图 + 推送飞书群用，
   不挂 .tab-pane（避免 fadeIn 动画影响截图时机判断），也刻意不含 .category-tabs。 */
.push-view { padding-bottom: 1rem; }

.push-date { font-size: 12px; color: var(--text-muted); }

  color-scheme: dark;
  --surface-0:#07111f; --surface-1:#0e1a2b; --surface-2:#152338; --surface-3:#1b2c44;

  --status-good:#2dd4a7; --status-warning:#f3ad3d; --status-serious:#fb8b5a; --status-critical:#ff6b6b;

}

body { max-width:1480px; min-height:100vh; font-size:14px; }
.topbar { margin:16px 20px 0; padding:18px 22px; border:1px solid var(--border); border-radius:var(--radius-lg); background:rgba(14,26,43,.94); box-shadow:var(--shadow-card); z-index:30; }

.category-tabs { margin:10px 20px 0; padding:6px; border:1px solid var(--border); border-radius:12px; background:var(--surface-1); gap:4px; box-shadow:0 1px 2px rgba(0,0,0,.2); }
.category-tab { flex:1; text-align:center; padding:10px 16px; border:0; border-radius:8px; min-height:40px; }
.category-tab.active { color:#fff; background:#2859c5; border:0; box-shadow:0 4px 16px rgba(40,89,197,.32); }
.category-tab:hover { background:var(--surface-2); }
.category-tab.active:hover { background:#2859c5; }
.section-label { padding-top:28px; font-size:11px; color:#91a2b8; }

.data-table tbody tr:hover { background:#12233a; }
.data-table .td-title { min-width:230px; max-width:340px; }
.cell-copy { display:-webkit-box; -webkit-line-clamp:3; line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; min-width:180px; max-width:320px; }
.cell-copy:hover { -webkit-line-clamp:unset; line-clamp:unset; }
.filter-bar { margin-top:20px; }
.filter-btn { min-height:36px; padding:7px 12px; background:var(--surface-1); }
.filter-btn.active { box-shadow:0 3px 10px rgba(37,99,235,.18); }
.rule-guide { background:#0b1727; box-shadow:none; }
.rule-guide summary { color:var(--text-secondary); }
.insight-card { background:linear-gradient(135deg,rgba(79,140,255,.16),var(--surface-1)); border-color:#2d4e78; color:var(--text-secondary); }
.trend-card,.rank-card { box-shadow:var(--shadow-card); }
.source-pill { background:#17263a; border-color:#2a405c; color:#c9d4e3; }
.tag { border:1px solid transparent; }
.tag-na { background:#1a293d; color:#9dafc5; border-color:#2b405a; }
.market-chips { display:flex; flex-wrap:wrap; gap:5px; min-width:110px; }
.market-chip { display:inline-flex; align-items:center; gap:5px; padding:3px 8px; border-radius:999px; background:#17283e; color:#c3d0e0; border:1px solid #2d4664; font-size:11px; font-weight:650; }

.variant-link { font-size:11px; color:#7eacff; font-weight:650; text-decoration:none; }

.comparison-box small { color:#9dadc2; line-height:1.45; }

.product-coverage { display:flex; flex-wrap:wrap; gap:8px; padding:0 1.5rem; }

a { color:#7eacff; }
.source-link { color:#7eacff; }
.footnote { color:#8190a5; }

/* ---------- Detail drill-down (Campaign/Product row expand) ---------- */
.row-expand-toggle {
  background:none; border:none; padding:0; color:inherit; font:inherit; text-align:left;
  cursor:pointer; display:inline;
}
.row-expand-toggle:hover { color:var(--hue-campaign); }
tr.detail-row td { background:var(--surface-2); padding:14px 16px; }
.detail-panel { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:16px; }
@media(max-width:1024px){ .detail-panel { grid-template-columns:repeat(2,minmax(0,1fr)); } }
.detail-panel-col { font-size:12.5px; color:var(--text-secondary); line-height:1.6; display:flex; flex-direction:column; gap:4px; }
.detail-panel-col .section-label { padding:0 0 2px !important; }
.zmx-compare-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.zmx-compare-col { padding:8px 10px; border-radius:8px; background:var(--surface-1); border:1px solid var(--border); font-size:12px; }
.zmx-compare-col strong { display:block; color:var(--text-primary); font-size:11px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px; }
</style>

<div id="app">
  <div class="loading" id="loadingMsg">加载看板数据…</div>
</div>

<script>
const DATA_URL = './data/dashboard.json';

const TOP_TABS = [
  { key: 'overview', label: 'Overview' },
  { key: 'campaign', label: 'Campaign' },
  { key: 'product', label: 'Product' },
  { key: 'listing', label: 'Listing' },
  { key: 'markets', label: 'Markets' },
  { key: 'search', label: 'Search' },
];
const CATEGORY_ORDER = ['campaign', 'product', 'listing', 'delisting'];
const CATEGORY_LABEL = { campaign: '活动 Campaign', product: '产品 Product', listing: '上币 Listing', delisting: '下架 Delisting', other: '其他' };
const DIFF_LABEL = { missing: '未检索到同类', diff: '已有同类 · 机制不同', same: '已有同类', mixed: '需人工核验', na: '未进行对比', pending: '待分析' };
const STATUS_LABEL = { new: '新增', changed: '变更', unchanged: '未变' };
const SOURCES = ['Bitunix', 'Weex', 'BingX', 'Phemex', 'Lbank'];
const LOCALE_LABEL = { EN: 'EN', FR: 'FR', VN: 'VN', ID: 'ID' };
const LOCALE_DOT_CLASS = { EN: 'en', FR: 'fr', VN: 'vn', ID: 'id' };
const PRIORITY_ORDER = { '高': 0, '中': 1, '低': 2 };
const DIFF_SORT_ORDER = { missing: 0, diff: 1, mixed: 2, same: 3, na: 3 };
const SEARCH_PAGE_SIZE = 50;

let DATA = null;
let state = { tab: 'overview', trendDays: 7, globalSource: 'all', globalMarket: 'all' };
let campaignState = { source: 'all', limit: 10, type: 'all', status: 'all', diffType: 'all', keyword: '', expanded: new Set() };
let productState = { source: 'all', limit: 10, category: 'all', status: 'all', market: 'all', diffType: 'all', keyword: '', expanded: new Set() };
let listingState = { source: 'all' };
let marketsState = { market: 'EN' };
let searchState = { locale: 'all', source: 'all', category: 'all', diffType: 'all', range: 'all', dateFrom: '', dateTo: '', query: '', page: 1 };

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function mockBadge(isMock) { return isMock ? `<span class="tag tag-mock">模拟</span>` : ''; }
function priorityClass(p) { return p === '高' ? 'priority-high' : p === '中' ? 'priority-medium' : 'priority-low'; }
function priorityRank(p) { return PRIORITY_ORDER[p] ?? 3; }
function diffRank(tag) { return DIFF_SORT_ORDER[tag] ?? 4; }
// 业务页面一律使用确定性排序；AI priority/diff 只展示，不参与顺序。
function publishTimeRank(row) { return Date.parse(row.post_time || 0) || 0; }
function campaignRuleRank(row) {
  if (campaignDisplayStatus(row) === 'New') return 0;
  if (row.status === 'changed') return 1;
  const today = DATA.meta.batch_date;
  if (row.start_date && row.start_date > today) return 3;
  if (row.end_date && row.end_date < today) return 4;
  return 2;
}
function campaignDisplayStatus(row) {
  const today = DATA.meta.batch_date;
  if (row.status === 'changed') return 'Updated';
  if (row.status === 'new' && formatDate(row.post_time) === today) return 'New';
  if (row.start_date && row.start_date > today) return 'Upcoming';
  if (row.end_date && row.end_date < today) return 'Ended';
  if (row.start_date || row.end_date) return 'Ongoing';
  return 'Date unknown';
}
function campaignRows() { return globalFiltered(DATA.campaign_all || DATA.campaign); }
function productRuleRank(row) { return row.status === 'new' ? 0 : 1; }
function listingRuleRank(row) {
  if (row.category === 'delisting') return 2;
  if (row.listing_kind === 'spot') return 0;
  if (row.listing_kind === 'perp') return 1;
  return 3;
}
function ruleSort(rows, category) {
  const rank = category === 'campaign' ? campaignRuleRank : category === 'product' ? productRuleRank : listingRuleRank;
  return [...rows].sort((a,b) => rank(a) - rank(b) || publishTimeRank(b) - publishTimeRank(a) || a.title.localeCompare(b.title));
}
function globalRuleSort(rows) {
  const moduleRank = { campaign: 0, product: 1, listing: 2, delisting: 2, other: 3 };
  return [...rows].sort((a,b) =>
    (moduleRank[a.category] ?? 4) - (moduleRank[b.category] ?? 4) ||
    (a.category === 'campaign' ? campaignRuleRank(a) : a.category === 'product' ? productRuleRank(a) : listingRuleRank(a)) -
    (b.category === 'campaign' ? campaignRuleRank(b) : b.category === 'product' ? productRuleRank(b) : listingRuleRank(b)) ||
    publishTimeRank(b) - publishTimeRank(a)
  );
}
function sourceLink(row, label='View source ↗') {
  return row.url ? `<a class="source-link" href="${esc(row.url)}" target="_blank" rel="noopener noreferrer">${esc(label)}</a>` : '<span title="源数据缺少 URL">链接缺失</span>';
}
function ruleGuide(scope) {
  const details = {
    overview: '<code>模块</code> Campaign → Product → Listing → Other；同模块按事件类型，再按发布时间倒序。全局 Top 5，每个交易所最多 2 条。多语言与重复抓取只计一次。',
    campaign: '<code>排序</code> New → Updated → Ongoing → Upcoming → Ended；同状态按发布时间倒序。AI 仅做抽取与总结，不参与排序或是否值得关注的判断。',
    product: '<code>排序</code> New Product → Update；同类型按发布时间倒序。产品覆盖表示本期涉及的能力分类，不代表历史产品总量。',
    listing: '<code>排序</code> New Spot → New Perpetual → Delisting → 未识别；同类型按发布时间倒序。Listing 不调用 AI 做优先级或 Zoomex 对比。',
  }[scope];
  return `<details class="rule-guide"><summary>口径与排序规则</summary><div class="rule-guide-body"><div>${details}</div><div><code>Zoomex 对比</code>“未检索到同类”仅表示当前基线没有召回证据，不等于确认缺失；“未进行对比”表示该模块不做对比或尚无分析结果。</div><div><code>可追溯性</code>每条记录均提供原始公告链接；完整历史统一在 Search 中检索。</div></div></details>`;
}
function formatTime(iso) {
  if (!iso) return '--:--';
  const t = iso.split('T')[1];
  return t ? t.slice(0, 5) : '--:--';
}
function formatDate(iso) {
  return iso ? iso.slice(0, 10) : '—';
}
function localeDot(locale) {
  const cls = LOCALE_DOT_CLASS[locale];
  return cls ? `<span class="locale-dot ${cls}"></span> ` : '';
}
function rowMarkets(row) { return row.markets || (row.locale ? [row.locale] : []); }
function globalFiltered(rows) {
  return (rows || []).filter(row =>
    (state.globalSource === 'all' || row.source === state.globalSource) &&
    (state.globalMarket === 'all' || rowMarkets(row).includes(state.globalMarket))
  );
}
function marketChips(row) {
  return `<div class="market-chips">${rowMarkets(row).map(locale => `<span class="market-chip">${localeDot(locale)}${esc(locale)}</span>`).join('')}</div>`;
}
function variantLinks(row) {
  const variants = row.localized_variants || [{ locale: row.locale, title: row.title, url: row.url }];
  return `<div class="variant-links">${variants.map(v => v.url ? `<a class="variant-link" href="${esc(v.url)}" target="_blank" rel="noopener noreferrer">${esc(v.locale)} source ↗</a>` : '').join('')}</div>`;
}
// Phase③起 Zoomex 对照来自 zmx_catalog_entry（目录 exists_flag）+ zmx_summary
// （zmx_counterpart 具体示例），campaign/product 共用同一套字段——不再是旧版
// 只有 product 才有的、基于全量历史词项重叠的 comparison_status
// in (candidate_found, baseline_unmatched)/zmx_candidates 机制（已retired，见
// export_data.py build_category_section 顶部注释）。
function zmxComparisonBox(row) {
  if (row.comparison_status !== 'analyzed') {
    return `<div class="comparison-box"><strong>尚未分析</strong><small>该条尚未被任何一次竞品分析运行覆盖，不是"确认无差异"。</small></div>`;
  }
  const label = esc(DIFF_LABEL[row.diff_tag] || row.diff_type || '不适用');
  const detail = esc(row.diff_detail || row.zmx_capability_desc || '');
  const counterpart = row.zmx_counterpart;
  const cls = row.diff_tag === 'same' ? 'matched' : row.diff_tag === 'missing' ? 'unmatched' : '';
  return `<div class="comparison-box ${cls}"><strong>${label}</strong>${detail ? `<small>${detail}</small>` : ''}${counterpart?.url ? `<div class="variant-links"><a class="variant-link" href="${esc(counterpart.url)}" target="_blank" rel="noopener noreferrer">Open Zoomex evidence ↗</a></div>` : ''}</div>`;
}

async function loadData() {
  try {
    const res = await fetch(DATA_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    const params = new URLSearchParams(location.search);
    const pushLocale = params.get('view') === 'push' ? params.get('locale') : null;
    if (pushLocale) {
      renderPushView(pushLocale);
    } else {
      render();
    }
  } catch (err) {
    document.getElementById('app').innerHTML =
      `<div class="load-error">数据加载失败：${esc(err.message)}<br>` +
      `请确认 docs/data/dashboard.json 已通过 python -m src.dashboard 生成。</div>`;
  }
}

/* ==================== Push view (compact per-locale digest for Feishu push) ====================
 * 触发方式：URL 带 ?view=push&locale=EN，不是六个顶层 tab 之一，用户正常点击浏览
 * 不会到达这里。src/dashboard/screenshot.py 直接导航到这个 URL 并等
 * [data-push-ready="{locale}"] 出现后截图。不新增任何导出字段——所有内容都是对
 * 已经随 DATA.campaign/product/listing 下发的数据做客户端过滤/聚合，保持导出
 * schema 稳定。 */
const PUSH_HIGHLIGHTS_CAP = 8;

function pushChipCard(label, rows) {
  const diffs = {};
  rows.forEach(r => { diffs[r.diff_tag] = (diffs[r.diff_tag] || 0) + 1; });
  const diffEntries = Object.entries(diffs).filter(([, n]) => n > 0);
  return `
    <div class="stat-card">
      <div class="stat-label">${esc(label)}</div>
      <div class="stat-value accent">${rows.length}</div>
      ${diffEntries.length ? `<div class="chip-diffs">${diffEntries.map(([t, n]) => `<span class="tag tag-${t}">${esc(DIFF_LABEL[t] || t)} ${n}</span>`).join('')}</div>` : ''}
    </div>
  `;
}

function renderPushView(locale) {
  const app = document.getElementById('app');

  const byLocale = arr => (arr || []).filter(r => r.locale === locale);
  const campaignRows = byLocale(DATA.campaign);
  const productRows = byLocale(DATA.product);
  const listingRows = byLocale(DATA.listing);
  const allRows = [...campaignRows, ...productRows, ...listingRows];
  const highlights = globalRuleSort(allRows).slice(0, PUSH_HIGHLIGHTS_CAP);

  app.innerHTML = `
    <div class="push-view">
      <div class="push-header">
        <span class="push-title">竞品情报日报 · ${esc(locale)}</span>
        <span class="push-date">${esc(DATA.meta.batch_date)}</span>
      </div>
      <div class="overview-grid" style="padding:0.75rem 1.25rem 0">
        ${pushChipCard('Campaign', campaignRows)}
        ${pushChipCard('Product', productRows)}
        ${pushChipCard('Listing（含下架）', listingRows)}
      </div>
      <div class="section-label">今日重点 · Rule-based Top ${PUSH_HIGHLIGHTS_CAP}</div>
      <div class="detail-list" style="padding:0 1.25rem">
        ${highlights.length ? highlights.map(r => `
          <div class="highlight-card ${r.diff_tag === 'missing' ? 'accent-missing' : ''}">
            <div class="hl-source">${esc(r.source)}</div>
            <div class="hl-body">
              <div class="hl-title">${esc(r.title)}</div>
              ${(r.description || r.follow_up) ? `<div class="hl-summary">${esc((r.description || r.follow_up || '').slice(0, 140))}</div>` : ''}
              <div class="hl-meta">
                <span class="tag tag-${r.diff_tag}">${esc(DIFF_LABEL[r.diff_tag] || r.diff_tag)}</span>
                <span class="tag tag-${r.category}">${esc(CATEGORY_LABEL[r.category] || r.category)}</span>
                ${mockBadge(r.is_mock)}
                <span class="hl-time">${formatTime(r.post_time)}</span>
              </div>
            </div>
          </div>
        `).join('') : `<div class="table-empty">最新一批（${esc(DATA.overview.batch_date)}）没有 priority=高 的重点</div>`}
      </div>
    </div>
    <div data-push-ready="${esc(locale)}"></div>
  `;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">竞品情报看板</span>
        <span class="topbar-date">${esc(DATA.meta.batch_date)}</span>
      </div>
      <div class="topbar-right">
        <span class="status-dot"></span>
        <span>Updated At ${esc(DATA.meta.generated_at)}</span>
        <div class="global-controls">
          <select class="global-select" id="globalSource" aria-label="全局平台筛选"><option value="all">All exchanges</option>${SOURCES.map(s => `<option value="${s}">${s}</option>`).join('')}</select>
          <select class="global-select" id="globalMarket" aria-label="全局市场筛选"><option value="all">All markets</option>${Object.keys(LOCALE_LABEL).map(l => `<option value="${l}">${l}</option>`).join('')}</select>
        </div>
      </div>
    </div>
    <div class="category-tabs" id="categoryTabs">
      ${TOP_TABS.map(t => `<div class="category-tab" data-tab="${t.key}">${esc(t.label)}</div>`).join('')}
    </div>
    <div id="paneHost"></div>
    <div class="footnote">

function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.category-tab').forEach(x => x.classList.toggle('active', x.dataset.tab === tab));
  renderActivePane();
}

function renderActivePane() {
  const host = document.getElementById('paneHost');
  if (state.tab === 'overview') { host.innerHTML = renderOverviewPane(); wireOverviewPane(); }
  else if (state.tab === 'campaign') { host.innerHTML = renderCategoryPane('campaign'); wireCategoryPane('campaign'); }
  else if (state.tab === 'product') { host.innerHTML = renderCategoryPane('product'); wireCategoryPane('product'); }
  else if (state.tab === 'listing') { host.innerHTML = renderListingPane(); wireListingPane(); }
  else if (state.tab === 'markets') { host.innerHTML = renderMarketsPane(); wireMarketsPane(); }
  else if (state.tab === 'search') { host.innerHTML = renderSearchPane(); wireSearchPane(); }
}

function computeActivityRanking() {
  const entries = Object.entries(DATA.meta.source_coverage).map(([source, info]) => ({ source, count: info.today, active: info.active }));
  entries.sort((a, b) => b.count - a.count);
  const max = Math.max(1, ...entries.map(e => e.count));
  return entries.map(e => ({ ...e, pct: Math.round(1000 * e.count / max) / 10 }));
}

function chipCard(key, label, chip) {
  const total = chip.today ?? (chip.count_new + chip.count_changed);
  const diffs = Object.entries(chip.diff_breakdown).filter(([, n]) => n > 0);
  // campaign/product 都走真实 Stage1/Stage3 分析（Phase②起），diff_breakdown
  // 对两者同样有意义，不再是只有 campaign 才展示的特殊逻辑。
  let secondary = (key === 'campaign' || key === 'product') && diffs.length
    ? `<div class="chip-diffs">${diffs.map(([tag, n]) => `<span class="tag tag-${tag}">${esc(DIFF_LABEL[tag] || tag)} ${n}</span>`).join('')}</div>`
    : '';
  return `
    <div class="stat-card">
      <div class="stat-label">${esc(label)}</div>
      <div class="stat-value ${key === 'announcement' ? '' : 'accent'}">${total}</div>
      <div class="stat-delta">新增 ${chip.count_new} · 变更 ${chip.count_changed}</div>
      ${secondary}
    </div>
  `;
}

function insightText(insight) {
  if (!insight || !insight.significant) return 'No Significant Changes Today';
  const parts = [];
  const leaders = insight.leaders || {};
  if (leaders.new_campaigns) parts.push(`${leaders.new_campaigns.source} 新增活动最多（${leaders.new_campaigns.count}）`);
  if (leaders.new_products) parts.push(`${leaders.new_products.source} 新增产品最多（${leaders.new_products.count}）`);
  if (leaders.reward_changes) parts.push(`${leaders.reward_changes.source} 奖励变化最多（${leaders.reward_changes.count}）`);
  const total = Object.values(DATA.overview.chips).reduce((n, c) => n + (c.today || 0), 0);
  parts.push(`今日共识别 ${total} 条去重后的新增或更新情报，建议优先查看 P1–P3 活动变化。`);
  return parts.join('。') + '。';
}

  const digest = DATA.daily_digest;
  if (digest && digest.source === 'llm' && digest.summary) {
    return `<div class="insight-card"><span class="tag tag-llm">LLM 生成</span> ${esc(digest.summary)}${digest.priority_focus ? `<div style="margin-top:6px">→ ${esc(digest.priority_focus)}</div>` : ''}</div>`;
  }
  return `<div class="insight-card"><span class="tag tag-na">占位符 · 待接入 LLM 生成</span> ${esc(insightText(ov.insight))}</div>`;
}

function overviewForFilters() {
  if (state.globalSource === 'all' && state.globalMarket === 'all') return DATA.overview;
  const chip = rows => {
    const values = globalFiltered(rows);
    const diff_breakdown = { missing:0, diff:0, same:0, mixed:0, na:0 };
    values.forEach(r => { diff_breakdown[r.diff_tag || 'na']++; });
    return { today:values.length, count_new:values.filter(r => r.status === 'new').length, count_changed:values.filter(r => r.status === 'changed').length, diff_breakdown };
  };
  const pool = globalFiltered([...(DATA.campaign||[]),...(DATA.product||[]),...(DATA.listing||[]),...(DATA.announcements||[])])
    .sort((a,b) => Number((a.business_priority||'P9').slice(1))-Number((b.business_priority||'P9').slice(1)) || publishTimeRank(b)-publishTimeRank(a));
  const counts = {}, selected = [];
  for (const r of pool) { if ((counts[r.source]||0)>=2) continue; selected.push(r); counts[r.source]=(counts[r.source]||0)+1; if(selected.length===5) break; }
  return {
    ...DATA.overview,
    chips:{ campaign:chip(DATA.campaign), product:chip(DATA.product), listing:chip((DATA.listing||[]).filter(r=>r.category==='listing')), announcement:chip([...(DATA.announcements||[]),...(DATA.listing||[]).filter(r=>r.category==='delisting')]) },
    highlights:selected.map(r=>({source:r.source,category:r.category,priority:r.business_priority||'P7',title:r.title,one_line_summary:(r.description||r.follow_up||'').slice(0,160),time:formatTime(r.post_time),url:r.url,is_mock:r.is_mock})),
  };
}

function wireOverviewPane() {
  document.querySelectorAll('[data-jump]').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.jump));

    state.trendDays = Number(btn.dataset.trendDays);
    renderActivePane();
  }));
  document.getElementById('overviewDate').addEventListener('change', e => {
    if (e.target.value !== DATA.overview.batch_date) {
      searchState.range = 'all';
      searchState.dateFrom = e.target.value;
      searchState.dateTo = e.target.value;
      searchState.query = '';

function zmxCompareTwoColumn(r) {
  const left = `<div class="zmx-compare-col"><strong>${esc(r.source)}</strong><div>${esc(r.title)}</div>${r.description ? `<div class="detail-body" style="margin-top:4px">${esc(r.description)}</div>` : ''}</div>`;

    right = `<div class="zmx-compare-col"><strong>Zoomex</strong><div class="detail-body">尚未被任何一次分析运行覆盖，不是"确认无差异"。</div></div>`;
  } else if (r.zmx_counterpart) {
    const c = r.zmx_counterpart;
    right = `<div class="zmx-compare-col"><strong>Zoomex</strong><div>${c.url ? `<a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.title)}</a>` : esc(c.title)}</div>${c.core_summary ? `<div class="detail-body" style="margin-top:4px">${esc(c.core_summary)}</div>` : ''}${c.reward_range ? `<div class="detail-body">奖励：${esc(c.reward_range)}</div>` : ''}</div>`;

        ? '<tr><th>Exchange</th><th>Activity</th><th>Type</th><th>Reward</th><th>Timeline</th><th>Markets</th><th>AI Summary</th><th>Zoomex / Action</th><th>Sources</th></tr>'
        : '<tr><th>Exchange</th><th>Product / Update</th><th>Category</th><th>Change Type</th><th>Markets</th><th>AI Summary</th><th>Zoomex Comparison</th><th>Follow-up</th><th>Sources</th></tr>'}
      </thead><tbody id="${category}Body"></tbody>
    </table></div>
  `;
}

function renderCategoryBody(category) {
  const rows = category === 'campaign' ? campaignRows() : globalFiltered(DATA[category]);
  const st = categoryStateFor(category);
  let filtered = st.source === 'all' ? rows : rows.filter(r => r.source === st.source);
  if (category === 'campaign') {
    if (st.type !== 'all') filtered = filtered.filter(r => (r.mechanism_type || '') === st.type);
    if (st.status !== 'all') filtered = filtered.filter(r => campaignDisplayStatus(r) === st.status);
  } else {
    if (st.type !== 'all') filtered = filtered.filter(r => (r.product_category || 'Others') === st.type);
    if (st.status !== 'all') filtered = filtered.filter(r => (r.update_kind || '') === st.status);
    if (st.market !== 'all') filtered = filtered.filter(r => rowMarkets(r).includes(st.market));
  }
  if (st.diffType !== 'all') filtered = filtered.filter(r => r.diff_tag === st.diffType);
  if (st.keyword) {
    const kw = st.keyword.toLowerCase();
    filtered = filtered.filter(r => (r.title || '').toLowerCase().includes(kw));
  }
  const sorted = ruleSort(filtered, category);
  const visible = sorted.slice(0, st.limit);
  const body = document.getElementById(`${category}Body`);
  document.getElementById(`${category}LoadMore`)?.remove();
  body.innerHTML = sorted.length
    ? visible.map(r => {
        const expanded = st.expanded.has(r.uid);
        const summaryRow = category === 'campaign' ? `
      <tr>
        <td><span class="source-pill">${esc(r.source)}</span></td>
        <td class="td-title"><button class="row-expand-toggle" data-expand="${esc(r.uid)}">${expanded ? '▾' : '▸'} ${esc(r.title)}</button><br><span class="status-chip ${r.status}">${esc(campaignDisplayStatus(r))}</span></td>
        <td>${esc(r.mechanism_type || '—')}</td><td>${esc(r.reward_range || '—')}</td>
        <td>${esc(r.start_date || '—')}<br><small>→ ${esc(r.end_date || '—')}</small></td><td>${marketChips(r)}</td>
        <td><div class="cell-copy">${esc(r.description || '待分析')}</div></td>
        <td><span class="tag tag-${r.diff_tag}">${esc(DIFF_LABEL[r.diff_tag] || '待分析')}</span>${r.follow_up ? `<br>${esc(r.follow_up)}` : ''}</td>
        <td>${variantLinks(r)}</td>
      </tr>` : `
      <tr>
        <td><span class="source-pill">${esc(r.source)}</span></td>
        <td class="td-title"><button class="row-expand-toggle" data-expand="${esc(r.uid)}">${expanded ? '▾' : '▸'} ${esc(r.title)}</button><br><span class="status-chip ${r.status}">${esc(STATUS_LABEL[r.status] || r.status)}</span></td>
        <td><span class="tag tag-product">${esc(r.product_category || 'Others')}</span></td><td>${esc(r.update_kind || '—')}</td>
        <td>${marketChips(r)}</td><td><div class="cell-copy">${esc(r.feature || r.description || '待分析')}</div></td>
        <td>${zmxComparisonBox(r)}</td><td><div class="cell-copy">${esc(r.follow_up || '—')}</div></td><td>${variantLinks(r)}</td>
      </tr>`;
        return summaryRow + (expanded ? renderDetailPanelRow(r, category) : '');
      }).join('')
    : `<tr><td colspan="9" class="table-empty">无匹配数据</td></tr>`;
  if (sorted.length > visible.length) {
    body.insertAdjacentHTML('afterend', `<tbody id="${category}LoadMore"><tr><td colspan="9" class="table-footer"><span>当前展示 ${visible.length} / ${sorted.length}</span><button class="filter-btn" data-load-more="${category}">Load More</button></td></tr></tbody>`);
    document.querySelector(`[data-load-more="${category}"]`).addEventListener('click', () => { st.limit += 10; renderCategoryBody(category); });
  }
  body.querySelectorAll('[data-expand]').forEach(btn => btn.addEventListener('click', () => {
    const uid = btn.dataset.expand;
    if (st.expanded.has(uid)) st.expanded.delete(uid); else st.expanded.add(uid);
    renderCategoryBody(category);
  }));
}

function wireCategoryPane(category) {
  const st = categoryStateFor(category);
  st.source = 'all'; st.limit = 10; st.type = 'all'; st.status = 'all'; st.diffType = 'all'; st.keyword = '';
  if (category === 'product') st.market = 'all';
  document.getElementById(`${category}SourceFilter`).addEventListener('click', e => {
    const t = e.target.closest('[data-src]');
    if (!t) return;
    document.querySelectorAll(`#${category}SourceFilter .filter-btn`).forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    st.source = t.dataset.src;
    st.limit = 10;
    renderCategoryBody(category);
  });
  document.getElementById(`${category}TypeFilter`).addEventListener('change', e => { st.type = e.target.value; st.limit = 10; renderCategoryBody(category); });
  document.getElementById(`${category}StatusFilter`).addEventListener('change', e => { st.status = e.target.value; st.limit = 10; renderCategoryBody(category); });
  document.getElementById(`${category}DiffFilter`).addEventListener('change', e => { st.diffType = e.target.value; st.limit = 10; renderCategoryBody(category); });
  if (category === 'product') {
    document.getElementById('productMarketFilter').addEventListener('change', e => { st.market = e.target.value; st.limit = 10; renderCategoryBody(category); });
  }
  const kw = document.getElementById(`${category}KeywordFilter`);
  let debounce;
  kw.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => { st.keyword = kw.value; st.limit = 10; renderCategoryBody(category); }, 200);
  });
  renderCategoryBody(category);
}

/* ==================== Search ==================== */

function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }

function searchFilteredRows() {
  const rows = globalFiltered(DATA.search_index.rows);
  const anchor = DATA.meta.batch_date;
  const rangeDays = { '30d': 30, '90d': 90, '365d': 365 }[searchState.range];
  const q = searchState.query.trim().toLowerCase();
  return rows.filter(r => {
    if (searchState.locale !== 'all' && !rowMarkets(r).includes(searchState.locale)) return false;
    if (searchState.source !== 'all' && r.source !== searchState.source) return false;
    if (searchState.category !== 'all' && r.category !== searchState.category) return false;
    if (searchState.diffType !== 'all' && (r.diff_type ? { 'ZMX缺失': 'missing', 'ZMX玩法不同': 'diff', 'ZMX已有': 'same', '混合': 'mixed', '不适用': 'na' }[r.diff_type] : 'na') !== searchState.diffType) return false;
    const date = r.post_time ? r.post_time.slice(0, 10) : null;
    if (rangeDays && (!date || daysBetween(date, anchor) > rangeDays)) return false;
    if (searchState.dateFrom && (!date || date < searchState.dateFrom)) return false;
    if (searchState.dateTo && (!date || date > searchState.dateTo)) return false;
    if (q && !r.title.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderSearchPane() {
  const idx = DATA.search_index;
  return `
    <div class="search-toolbar">
      <div class="search-filter-row">
        <span class="search-filter-label">地区</span>
        <button class="filter-btn active" data-f="locale" data-v="all">全部</button>
        ${Object.keys(LOCALE_LABEL).map(l => `<button class="filter-btn" data-f="locale" data-v="${l}">${esc(LOCALE_LABEL[l])}</button>`).join('')}
      </div>
      <div class="search-filter-row">
        <span class="search-filter-label">时间</span>
        <button class="filter-btn active" data-f="range" data-v="all">全部时间</button>
        <button class="filter-btn" data-f="range" data-v="30d">近 30 天</button>
        <button class="filter-btn" data-f="range" data-v="90d">近 90 天</button>
        <button class="filter-btn" data-f="range" data-v="365d">近 1 年</button>
        <label class="date-control">From <input class="date-input" id="searchDateFrom" type="date" min="${esc(idx.date_min)}" max="${esc(idx.date_max)}" value="${esc(searchState.dateFrom)}"></label>
        <label class="date-control">To <input class="date-input" id="searchDateTo" type="date" min="${esc(idx.date_min)}" max="${esc(idx.date_max)}" value="${esc(searchState.dateTo)}"></label>
        <button class="filter-btn" id="clearDates">清除日期</button>
        <span style="font-size:11px;color:var(--text-muted);margin-left:4px">数据跨度 ${esc(idx.date_min)} ~ ${esc(idx.date_max)}</span>
      </div>
      <div class="search-filter-row">
        <span class="search-filter-label">来源</span>
        <button class="filter-btn active" data-f="source" data-v="all">全部</button>
        ${SOURCES.map(s => `<button class="filter-btn" data-f="source" data-v="${s}">${s}</button>`).join('')}
      </div>
      <div class="search-filter-row">
        <span class="search-filter-label">分类</span>
        <button class="filter-btn active" data-f="category" data-v="all">全部</button>
        ${CATEGORY_ORDER.map(c => `<button class="filter-btn" data-f="category" data-v="${c}">${CATEGORY_LABEL[c]}</button>`).join('')}
        <button class="filter-btn" data-f="category" data-v="other">其他</button>
      </div>
      <div class="search-filter-row">
        <span class="search-filter-label">差异</span>
        <button class="filter-btn active" data-f="diffType" data-v="all">全部</button>
        ${Object.entries(DIFF_LABEL).filter(([k]) => k !== 'pending').map(([k, v]) => `<button class="filter-btn" data-f="diffType" data-v="${k}">${esc(v)}</button>`).join('')}
        <input type="text" class="search-input" id="searchQuery" placeholder="搜索标题…">
      </div>
    </div>
    <div class="search-summary" id="searchSummary"></div>
    <div style="padding:0 1.5rem"><button class="filter-btn" id="downloadCsv">下载当前结果 CSV</button></div>
    <div class="table-wrap" style="margin-top:8px">
      <table class="data-table">
        <thead><tr><th style="width:90px">来源</th><th style="width:64px">地区</th><th>标题</th><th style="width:110px">分类</th><th class="td-time" style="width:88px">日期</th><th style="width:110px">差异</th><th style="width:70px">优先级</th><th style="width:76px">状态</th></tr></thead>
        <tbody id="searchBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="searchPagination"></div>
  `;
}

function renderSearchTable() {
  const filtered = searchFilteredRows();
  const totalPages = Math.max(1, Math.ceil(filtered.length / SEARCH_PAGE_SIZE));
  searchState.page = Math.min(searchState.page, totalPages);
  const start = (searchState.page - 1) * SEARCH_PAGE_SIZE;
  const pageRows = filtered.slice(start, start + SEARCH_PAGE_SIZE);

  document.getElementById('searchSummary').innerHTML =
    `共 <strong>${filtered.length}</strong> 条匹配结果（全量共 ${DATA.search_index.total} 条）`;

  document.getElementById('searchBody').innerHTML = pageRows.length ? pageRows.map(r => {
    const diffTag = r.diff_type ? { 'ZMX缺失': 'missing', 'ZMX玩法不同': 'diff', 'ZMX已有': 'same', '混合': 'mixed', '不适用': 'na' }[r.diff_type] || 'na' : 'na';
    return `
    <tr>
      <td><span class="source-pill">${esc(r.source)}</span></td>
      <td>${marketChips(r)}</td>
      <td class="td-title">${esc(r.title)}${variantLinks(r)}</td>
      <td><span class="tag tag-${r.category}">${esc(CATEGORY_LABEL[r.category] || r.category)}</span></td>
      <td class="td-time">${formatDate(r.post_time)}</td>
      <td><span class="tag tag-${diffTag}">${esc(DIFF_LABEL[diffTag] || diffTag)}</span></td>
      <td>${r.priority ? `<span class="tag ${priorityClass(r.priority)}">${esc(r.priority)}</span>` : '—'}</td>
      <td><span class="status-chip ${r.status}">${esc(STATUS_LABEL[r.status] || r.status)}</span></td>
    </tr>
  `;
  }).join('') : `<tr><td colspan="8" class="table-empty">无匹配数据，试试放宽筛选条件</td></tr>`;

  document.getElementById('searchPagination').innerHTML = `
    <button class="page-btn" id="pagePrev" ${searchState.page <= 1 ? 'disabled' : ''}>← 上一页</button>
    <span>第 ${searchState.page} / ${totalPages} 页</span>
    <button class="page-btn" id="pageNext" ${searchState.page >= totalPages ? 'disabled' : ''}>下一页 →</button>
  `;
  const prev = document.getElementById('pagePrev'), next = document.getElementById('pageNext');
  if (prev) prev.addEventListener('click', () => { searchState.page--; renderSearchTable(); });
  if (next) next.addEventListener('click', () => { searchState.page++; renderSearchTable(); });
}

function wireSearchPane() {
  document.querySelectorAll('[data-f]').forEach(btn => {
    const field = btn.dataset.f, val = btn.dataset.v;
    btn.classList.toggle('active', searchState[field] === val);
  });
  document.querySelectorAll('.search-filter-row').forEach(row => {
    row.addEventListener('click', e => {
      const t = e.target.closest('[data-f]');
      if (!t) return;
      const field = t.dataset.f;
      row.querySelectorAll(`[data-f="${field}"]`).forEach(b => b.classList.remove('active'));
      t.classList.add('active');
      searchState[field] = t.dataset.v;
      searchState.page = 1;
      renderSearchTable();
    });
  });
  const q = document.getElementById('searchQuery');
  q.value = searchState.query;
  let debounce;
  q.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      searchState.query = q.value;
      searchState.page = 1;
      renderSearchTable();
    }, 200);
  });
  ['From','To'].forEach(which => document.getElementById(`searchDate${which}`).addEventListener('change', e => {
    searchState[`date${which}`] = e.target.value;
    searchState.range = 'all';
    searchState.page = 1;
    renderSearchTable();
  }));
  document.getElementById('clearDates').addEventListener('click', () => {
    searchState.dateFrom = ''; searchState.dateTo = ''; searchState.page = 1; renderActivePane();
  });
  document.getElementById('downloadCsv').addEventListener('click', () => {
    const fields = ['source','locale','category','title','post_time','status','diff_type','priority','url'];
    const quote = value => `"${String(value ?? '').replaceAll('"', '""')}"`;
    const csv = [fields.join(','), ...searchFilteredRows().map(r => fields.map(f => quote(r[f])).join(','))].join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `competitor-intelligence-${DATA.meta.batch_date}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  });
  renderSearchTable();
}

loadData();
</script>
