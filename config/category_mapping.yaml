           # 顶层 tab + 各自子分类），key 是 raw_category 落库的 columnId（详情接口
           # `noticeContent.columnId`，叶子分类数值 id，字符串化）。
           # 顶层 tab 本身（53/58/64/69，均带子分类）理论上文章不会直接挂在顶层，
           # 但保留顶层 id 的映射做防御性兜底（万一有文章没有更细的子分类）；
           # 57/63/129 三个顶层本身没有子分类，文章会直接挂在顶层 id 上。
