# ============================================================
# 各源原生分类（announcements.raw_category）→ 我方标签的映射表。
# 我方标签取值：campaign / product / listing / delisting / other（与 schema.sql
# announcements.category / insights.category 的 CHECK 约束一致，2026-07-14 起
# delisting 独立成一类，不再落入 listing，见 CLAUDE.md 推送规则表）。
#
# Phase 3 分类打标第一层（原生分类映射）读取本文件；命中不了的（映射到 other 或
# 无映射）再走第二层标题关键词匹配，详见 phasePrompts.md Phase 3。
#
# 【Phase 2.6 订正，2026-07-14】首版（本文件 Phase 2.5 创建时）的 key 是人类可读
# section name，但 announcements.raw_category 落库的是源端原始值（Bitunix/Weex 是
# 数值 section_id，Zoomex 是数值 menu_id）——Phase 3 拿 raw_category 去查这张表会
# 一条都命中不了（"18540264809497" 查不到 "Latest Announcements"），第一层映射会
# 静默全线 miss，全部落到关键词层和 LLM 层，分类准确率和成本都会跟着崩。改为直接用
# raw_category 的原始值做 key，零运行时转换、零字符串匹配脆弱性；人类可读名称写成
# 行内注释，仅供人工核对，不参与匹配。
#
# 同时把 Phase 2.5 版本里未经验证、抄自网站前台菜单名的 bitunix/weex 映射值全部
# 作废，改用真实请求验证：
#   GET https://support.bitunix.com/api/v2/help_center/en-us/sections.json?per_page=100
#   GET https://weexsupport.zendesk.com/api/v2/help_center/en-us/sections.json?per_page=100
# 抽真实采集结果核对（data/competitor_intel.db 里 Bitunix EN 1534 条、Weex EN 1038 条
# 实际出现的 raw_category 值），确认下面每一个 section_id 都是真实在用的分类，不是
# 凭空列出的候选项。Zendesk section_id 跨 locale 一致（同一分类在 EN/FR/ID 下 id 不变，
# 已用 bitunix_FR.json / weex_FR.json fixture 交叉验证），所以同一份 bitunix/weex 映射
# 对该源全部 locale 都适用，不需要按 locale 拆分。
# ============================================================

bitunix:   # category_id=13760946490649（"Announcements"）下的全部 8 个 section，
           # 逐一对照真实采集到的 8 个 raw_category 值（746/228/216/115/111/108/8/2 条）
  "13762039477017": campaign    # Events and Activities
  "16707858318105": product     # Products and Services
  "17983093824153": product     # Derivatives & Perpetual Futures
  "57068501750297": product     # Earn
  "39073446124953": product     # Copy Trading
  "13762037166105": listing     # New Listings
  "47601070306585": delisting   # Delisting
  "13762058994073": other       # Maintenance and Upgrade
  # 【2026-07-20 新增，见 CLAUDE.md「补充活动类内容采集端口」】活动中心端口
  # （src/collectors/bitunix_activity.py）没有数值 raw_category 可用，直接用
  # collector 自己的字面量 category_key（跟 Phemex 的 news/activities/newsletter
  # 是同一个惯例），一次性把该端口全部内容判成 campaign——这个端口本身就是
  # 活动中心，不需要再靠映射表区分子类型。
  "campaign_center": campaign

weex:      # category_id=18540264809497（"Latest Announcements"）下的全部 4 个 section，
           # 逐一对照真实采集到的 4 个 raw_category 值（349/253/233/203 条，合计=1038=全量）
  "18540506359065": campaign    # Futures events
  "33143373088665": campaign    # Spot events
  "18540491393305": campaign    # Reward distribution
  "18540289930137": other       # Latest updates —— 混合分区（vote-to-list/质押新品/
    # 杠杆调整/系统维护都混在一起），第一层维持 other 不变；product 类内容改由
    # src/pipeline/category.py 的 WEEX_LATEST_UPDATES_PRODUCT_FALLBACK 专属兜底层
    # 在第二层拉出来，见 CLAUDE.md「Weex 补充 section 采集」
  # 【Phase 2.7 新增】category_id=44507081559193「Listings/Delistings」下的全部 4 个
  # section，真实请求 GET .../categories/44507081559193/sections.json 反查确认 id，
  # 真实采集当天 total=3199（4 个 section 合计）。之前完全没被采集（详见 CLAUDE.md
  # 「Phase 2.7」），本次已在 sources.yaml 补上 categories.listings_delistings endpoint。
  "18540509241753": listing     # New spot listings
  "47660531875481": listing     # New futures listings
  "37576213158553": delisting   # Spot delisting/maintenance
  "47660551001369": delisting   # Futures delisting/maintenance
  # 【Phase 2.7 新增，用户确认后采集】category_id=49344046693529「P2P Trading」下的
  # section "P2P Announcement"（section_id=49365180202777），不是整个 category（同
  # category 下另外 3 个 section 是纯 FAQ，没有采集）。真实采集 EN total=17 / FR
  # total=6，抽样标题全是区域专属活动/新增法币支持，映射到 campaign。
  "49365180202777": campaign    # P2P Announcement
  # 【2026-07-14 数据源迁移侦察新增，见 CLAUDE.md「Weex 数据源迁移」】改用 category
  # 级聚合页采集后，发现一个旧 Zendesk sections.json 查不到的新 section
  # （旧 API 从未收录过，只存在于新的 www.weex.com 前台数据里），真实标题抽样：
  # "TradFi futures zero-fee promotion ends on July 8"、"WEEX TradFi Futures Fee
  # Adjustment Announcement" 是费率类公告，"About WEEX TradFi futures"、"Types of
  # assets you can trade on WEEX TradFi" 是产品说明，6 篇里费率公告和产品说明混杂，
  # 整体基调映射为 product（不是 campaign，没有奖励/活动性质；也不是 other，费率
  # 调整对运营有情报价值）。
  "608152974386": product      # All about TradFi
  # 【真实采集 2026-07-14 撞见】"Listings/Delistings" category 聚合页下的另一个新
  # section，真实标题抽样（FR，1 篇）："Annonce de WEEX concernant le retrait du
  # produit de staking flexible XAUT"（WEEX 关于下架 XAUT 活期理财产品的公告）——
  # 下架的是 Earn 理财产品而非交易对，但性质上就是"停止提供某个产品"，映射为
  # delisting（跟 category 名字"All about Earn delistings/maintenance"一致）。
  "12312367451234": delisting  # All about Earn delistings/maintenance
  # 【2026-07-20 新增，见 CLAUDE.md「补充活动类内容采集端口」】活动奖励端口
  # （src/collectors/weex_rewards.py），理由跟 bitunix.campaign_center 一致。
  "rewards": campaign

bingx:     # 12 个分区的 sectionId 数值来自 Phase 1 补充侦察对 __NUXT_DATA__ 的真实反查
           # （见 config/sources.yaml bingx EN 块注释），非猜测；BingX 采集器尚未实现
