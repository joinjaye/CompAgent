phemex:    # 【Phase 2.6 订正，2026-07-14】sources.yaml 原 field_mapping.category 写的是
           # `category.name`（解析后的响应字段）。Phase 1 侦察时其实已经记录了这个字段是
           # locale 相关的翻译文本（sources.yaml phemex FR 块注释：category_id 438 对应
           # name:'Nouvelles'，跟 EN 432 的 'News' 不是同一个字符串，i18n 各 locale 独立
           # 编号），但当时没有连到"这会让 category_mapping.yaml 按名称查表全部落空"这个
           # 后果上。如果 raw_category 真的存 category.name，这张表就得每个 locale 各写
           # 一份、还要覆盖所有语言的翻译文本，Bitunix/Weex 那次用人类可读名称当 key 踩过的
           # 坑会在 Phemex 批次重演。Phemex 采集器尚未实现（批次 3），建议 raw_category 改存
           # "抓取时用的哪个 categories.* 子源 key"（news/activities/newsletter，locale
           # 无关，本来就是 sources.yaml 配置里的字面量，采集时天然知道，不需要解析响应
           # 字段），本文件的 key 提前按这个设计写：
  "news": other
  "activities": campaign
  "newsletter": other

lbank:     # 【2026-07-15 简化，见 CLAUDE.md「Lbank 真实 API 重写」末尾追加记录】省掉
           # 详情请求（updateTime 不驱动 full_scan 的变更检测、columnId 精度超过下游
           # 需要）后，raw_category 直接落请求时用的顶层 categoryCode（不再是详情接口
           # 的叶子 columnId），7 个顶层 code 正好对应 Lbank 官网公告中心的 7 个 tab
           # （All / LBank VIP / New Listings / Event Announcements / System Upgrades
           # & Maintenance / Platform Updates / Delisting Information / Fiat）。
           # CO00000129/CO00000063 沿用简化前已用真实标题验证过的 campaign 判断
           # （LBank VIP 是活动性质的会员权益公告；Fiat 抽样标题以 P2P/充值促销活动
           # 为主，如 "Deposit BRL with 0 Fees"），不因为这次简化丢失已验证结论。
           # 简化前的 15 个叶子 key 映射已删除（不再落库，历史记录见 git blame）。
  "CO00000053": listing      # New Listings
  "CO00000057": delisting    # Delisting Information（已用真实标题核对："Will Delist Certain Trading Pairs"）
  "CO00000058": campaign     # Event Announcements
  "CO00000064": other        # System Upgrades & Maintenance
  "CO00000069": product      # Platform Updates
  "CO00000129": campaign     # LBank VIP（无子分类，活动性质的会员权益公告）
  "CO00000063": campaign     # Fiat（无子分类，抽样标题以 P2P/充值促销活动为主）
  # 【2026-07-20 新增，见 CLAUDE.md「补充活动类内容采集端口」】精选活动端口
  # （src/collectors/lbank_events.py），理由跟 bitunix.campaign_center 一致。
  "new_popular_events": campaign

