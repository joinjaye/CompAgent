# ============================================================
# Phase 4 LLM 分析层配置。
#
# 凭证（LLM_API_KEY / LLM_API_BASE / LLM_MODEL）不放在这里，走
# config/.env.example 模板 -> 实际 .env（gitignored），由 src/analysis/config.py
# 读取。本文件只放非敏感的分析参数，改这些值不需要碰代码。
#
# LLM_API_BASE 约定指向一个 OpenAI 兼容的 /chat/completions endpoint（"任何 OpenAI
# 兼容接口"里最大公约数的调用形态），Anthropic 原生 API 需要经由兼容层
# （如 Anthropic 官方的 OpenAI-compatible endpoint）接入，不在本层做双协议分支。
# ============================================================

llm:
  provider: openai_http   # openai_http（默认，src/analysis/llm.py）| cursor_agent
                           # （2026-07-15 新增，src/analysis/cursor_agent.py，走 cursor_sdk
                           # 的 Agent.prompt()，不是 OpenAI 兼容协议，见该文件顶部注释）
  max_calls_per_run: null # 熔断：null 不限制。cursor_agent 拿不到真实美元金额（RunResult
                           # 只有 token 用量），用调用次数近似控制花费，达到这个数就停止
                           # 对剩余批次发起新的 LLM 调用（已产出的照常入库，跳过的批次留到
                           # 下次重跑，不是失败）。openai_http 理论上也认这个字段，但目前
                           # 没有真实需要用到。
  temperature: 0          # 全部 prompt 要求输出稳定，固定为 0
  timeout_s: 60
  max_retries: 3
  max_tokens_by_category:
    campaign: 2800   # v2（2026-07-20）：每篇 article 新增 5 个字段，随批次文章数
    product: 2800    # 线性增长（不再只是单个 zmx_comparison 对象的固定开销），
    listing: 2200    # 上调后的数值是经验起点，真实 --dry-run/小批量验收后可再校准
    delisting: 1300

prompt_versions:          # 改某个 category 的 prompt 正文后必须递增这里的版本号
  campaign: campaign-v2   # v2（2026-07-20）：articles[] 逐条新增 diff_type/priority/
  product: product-v2     # follow_up/change_kind(仅campaign)/listing_kind(仅listing)/
  listing: listing-v2     # evidence_indices(campaign/product/listing)，详见模板正文
  delisting: delisting-v2

zmx_baseline:              # 结构化 Zoomex 基线（取代原来的 zmx_index TF-IDF 检索，
                            # 见 src/analysis/zmx_baseline.py 顶部注释 / CLAUDE.md）
  lookback_days: 90        # 只取近 90 天（提取和查询两端都受这个窗口约束）
  max_entries_per_batch: 20    # 注入单次竞品分析 prompt 的基线条数上限
  max_examples_per_type: 2     # 每个 mechanism_type 最多保留几条最新示例
  extraction:               # python -m src.analysis.zmx_baseline 用，跟竞品分析
                             # （python -m src.analysis）完全独立的一套熔断上限
    batch_size: 15                 # 每次提取 LLM 调用打包的 Zoomex 公告数
    prompt_version: zmx-extract-v1   # 改提取 prompt 正文必须递增
    response_max_tokens: 3000        # 单次提取调用的响应 token 上限（结构化输出
                                      # 最多 15 条，比竞品分析的 batch_summary 更长）
    max_calls_per_run: null          # 熔断上限（按调用次数），null 不限制
    price_usd_per_1k_tokens: 0.002   # $0.03 / 15k tokens 换算，真实计费口径
    max_cost_usd_per_run: null       # 熔断上限（按美元），null 不限制；
                                      # 真实执行本次用 CLI --max-cost-usd 10 传入
    max_tokens_per_run: null         # 熔断上限（按 token），null 不限制；
                                      # 真实执行本次用 CLI --max-tokens 5000000 传入

content_truncation:
  article_content_chars: 4000   # 单篇正文喂给 LLM 前的截断上限，超长正文（个别 Weex
                                 # 活动规则页）避免把 token 预算全部耗在一篇文章上
  zmx_preview_chars: 400         # ZMX_BLOCK 每条摘要长度，跟 prompt 文本里的
                                 # content_preview 定义一致
