# ============================================================
# 数据源配置模板
# 由 Phase 1（数据源侦察）填充。本文件中的值必须来自实测的 curl 请求结果，
# 严禁凭记忆或猜测填写 API 地址 / 字段映射。
#
# 字段说明：
#   endpoint        公告列表接口 URL。若该源没有 JSON API，只有网页，则留空，
#                   detail_mode 记为 html，不要伪造 API。
#   method          GET / POST
#   headers         必要的请求头（如 User-Agent、Accept-Language）。
#                   敏感凭证（如需要）不要写在这里，走 .env。
#   locale_param    locale 如何传递给接口：
#                     "path"          —— 拼在 URL path 里（如 /en/announcements）
#                     "query:<key>"   —— query 参数，如 "query:lang"
#                     "header:<key>"  —— 请求头，如 "header:Accept-Language"
#   pagination      分页机制，如：
#                     {type: offset, param: page, page_size: 20}
#                     {type: cursor, param: cursor}
#   rate_limit_ms   请求间隔毫秒数（合规限速，Phase 1 通过连续请求观察后确定）
#   detail_mode     inline         —— 列表接口已含正文，无需再请求详情
#                   separate_api   —— 需另外请求详情接口取正文
#                   html           —— 仅有网页，无 JSON API（服务端渲染，可直接抓 HTML 正文）
#                   blocked        —— 该源受阻（如纯客户端渲染 SPA、需要登录、Cloudflare 拦截等），
#                                   见对应条目上方注释里记录的受阻原因和已尝试方法
#   has_update_time 源端是否提供可靠的 update_time / updated_at 等字段。
#                   Phase 1 需抽样 5-10 条核对：若 update_time 与 post_time 全部相同，
#                   视为不可靠，标 false 并令 strategy=full_scan；
#                   若存在差异，标 true，strategy=watermark。
#   strategy        watermark / full_scan，与 has_update_time 的判断一致，Phase 1 填。
#   field_mapping   响应字段 -> 本地字段名的映射（article_id / title / content /
#                   post_time / update_time / category 分别对应响应里的哪个 key）。
# ============================================================

sources:
  bitunix:
    # ============================================================
    # 侦察结论（Phase 1，2026-07-13）：✅ 通，EN/FR/ID。注意：真实公告中心不在
    # www.bitunix.com 主站（那是 Cloudflare WAF 保护的 Nuxt SPA，其 CMS 后端
    # platformgateway.bitunix.com 对所有路径返回 403 "Access restricted"，
    # curl 无法绕过，判定该路径死路，不值得为此上 headless browser）。真实可
    # 抓取的公告内容在 Bitunix 的 **Zendesk Help Center**：
    # support.bitunix.com，Announcements 分类 id=13760946490649。
    # 标准 Zendesk Help Center REST API，公开匿名可访问，/api/v2/ 路径没有
    # Cloudflare 挑战（/hc/ 的 HTML 页面有挑战，但 API 没有）。
    # 抽样 30 条 EN 文章（按 position 排序），29/30 updated_at != created_at，
    # 且有真实的跨天/多天差异 -> strategy: watermark，用 updated_at 做水位线，
    # 服务端原生支持 ?sort_by=updated_at&sort_order=desc 排序，适合轮询。
    # 另有 edited_at 字段（仅内容正文编辑时间），多数抽样与 created_at 相等，
    # 说明 updated_at 会被 metadata-only 变更（如分类/位置调整）触发，是超集
    # 信号而非精确内容变更信号 —— 因此仍按项目设计用 content_hash 做二次校验。
    # per_page 最高测到 100（Zendesk 常见上限）。10 次连续请求 500ms 间隔全部
    # 200，无限流/Cloudflare 挑战。robots.txt 未禁止本接口路径。
    # ============================================================
    EN:
      endpoint: "https://support.bitunix.com/api/v2/help_center/en-us/categories/13760946490649/articles.json"
      method: GET
      headers: {}
      locale_param: "path"   # Zendesk 自己的 locale code，如 en-us / fr / id，拼在 path 里
      pagination: {type: offset, param: page, page_size_param: per_page, page_size: 100}
      rate_limit_ms: 500
      detail_mode: inline   # 列表 body 字段已含完整正文 HTML（实测 34-55KB），无需再请求详情
      has_update_time: true
      strategy: watermark   # 支持 ?sort_by=updated_at&sort_order=desc，抽样 29/30 存在真实差异
      field_mapping:
        article_id: id   # 数值，跨 locale 一致，可直接做 group_id
        title: title
        content: body   # HTML 字符串
        post_time: created_at   # ISO8601 UTC，Z 后缀
        update_time: updated_at   # ISO8601 UTC；另有 edited_at（仅内容编辑），updated_at 是超集信号
        category: section_id   # 数值，直接落库进 announcements.raw_category，不做运行时转换。
          # Zendesk section_id 跨 locale 一致（已用 bitunix_FR.json 交叉验证），映射表见
          # config/category_mapping.yaml（Phase 2.6 已用真实 sections.json 验证过全部 8 个值）
      # update_time 可靠性抽样（30 条，EN，节选 5 条，完整见 recon 记录）：
      #   59923371883417  created 2026-07-11T00:45:26Z  updated 2026-07-13T00:24:06Z  差异
      #   59908400363161  created 2026-07-10T10:08:39Z  updated 2026-07-10T10:13:53Z  差异
      #   59645135417497  created 2026-07-03T10:29:04Z  updated 2026-07-03T10:29:04Z  相等（1/30）
      #   59530587129497  created 2026-06-30T09:46:11Z  updated 2026-07-10T02:24:53Z  差异
      #   59350723768857  created 2026-06-25T03:24:44Z  updated 2026-06-27T12:56:27Z  差异
      #   29/30 存在真实差异，确认 watermark 可靠
      # 分类观察值（section_id -> EN name）：16707858318105 Products and Services /
      #   13762039477017 Events and Activities / 13762037166105 New Listings /
      #   17983093824153 Derivatives & Perpetual Futures / 57068501750297 Earn /
      #   39073446124953 Copy Trading / 47601070306585 Delisting /
      #   13762058994073 Maintenance and Upgrade
      # 时间格式：ISO8601 字符串，Z 后缀（UTC）
      # www.bitunix.com 主站 SPA + platformgateway.bitunix.com 已确认为死路（403，
      # Cloudflare 拦截），不作为该源的 endpoint 候选。
    FR:
      endpoint: "https://support.bitunix.com/api/v2/help_center/fr/categories/13760946490649/articles.json"
      method: GET
      headers: {}
      locale_param: "path"
      pagination: {type: offset, param: page, page_size_param: per_page, page_size: 100}
      rate_limit_ms: 500
      detail_mode: inline
      has_update_time: true
      strategy: watermark   # 机制与 EN 完全一致
      field_mapping:
        article_id: id
        title: title
        content: body
        post_time: created_at
        update_time: updated_at
        category: section_id
    ID:
      endpoint: "https://support.bitunix.com/api/v2/help_center/id/categories/13760946490649/articles.json"
      method: GET
      headers: {}
      locale_param: "path"
      pagination: {type: offset, param: page, page_size_param: per_page, page_size: 100}
      rate_limit_ms: 500
      detail_mode: inline
      has_update_time: true
      strategy: watermark
      field_mapping:
        article_id: id
        title: title
        content: body
        post_time: created_at
        update_time: updated_at
        category: section_id
  weex:
    # ============================================================
    # 侦察结论（Phase 1，2026-07-13）：✅ 通。Weex 公告中心跑在 Zendesk 上
    # （weex.com/help/* 是 weexsupport.zendesk.com 的 SEO 代理），Zendesk 标准
    # Help Center REST API 可直接匿名访问，无需鉴权。公告归属 Zendesk
    # category_id=18540264809497（"Latest Announcements"），下设 4 个 section：
    # Latest updates / Futures events / Spot events / Reward distribution。
    # 抽样确认 updated_at 与 created_at 存在真实差异（见下方 EN/FR 抽样数据），
    # 判定 strategy: watermark。10 次连续请求（500ms 间隔）全部 200，无限流。
    # weexsupport.zendesk.com 无 robots.txt 限制；weex.com/robots.txt 只禁止
    # 带 utm/gad 追踪参数的 URL 和 register 页，与本接口无关。
    # 注意：这是第三方 Zendesk 托管接口而非 Weex 自建 API，理论上存在 Weex
    # 未来迁移掉 Zendesk 的风险，但目前是真实可用的live机制。
    # ============================================================
    EN:
      endpoint: "https://weexsupport.zendesk.com/api/v2/help_center/en-us/categories/18540264809497/articles.json"
      method: GET
      headers: {}   # 匿名可访问，无需鉴权头；仅用普通浏览器 User-Agent 测试过
      locale_param: "path"   # Zendesk 自己的 locale code，拼在 path 里，如 /en-us/
      pagination: {type: offset, param: page, page_size_param: per_page, page_size: 30}
      rate_limit_ms: 500   # 连续 10 次请求 500ms 间隔全部 200，未观察到限流；采用同等节奏
      detail_mode: inline   # 列表 body 字段已含完整正文 HTML，无需再请求详情
      has_update_time: true
      strategy: watermark   # 支持 ?sort_by=updated_at&sort_order=desc 排序，适合水位线轮询
      field_mapping:
        article_id: id
        title: title
        content: body   # HTML 字符串
        post_time: created_at   # ISO8601 UTC，如 2026-05-16T07:54:53Z
        update_time: updated_at   # ISO8601 UTC；抽样确认与 created_at 存在真实差异，见下方样本
        category: section_id   # 数值，直接落库进 announcements.raw_category，不做运行时转换；
          # 映射表见 config/category_mapping.yaml（Phase 2.6 已用真实 sections.json 验证全部
          # 4 个值）。同时发现 weexsupport.zendesk.com 还有一个独立分类 category_id=
          # 44507081559193「Listings/Delistings」（4 个 section），当前 endpoint 未覆盖，
          # 详见 category_mapping.yaml weex 块注释——是否补采集本文件不擅自决定
      # update_time 可靠性抽样（10 条，按 updated_at desc 排序）：
      #   57976712091673 created 2026-05-16T07:54:53Z updated 2026-05-16T12:10:01Z
      #   57945631674777 created 2026-05-15T07:01:59Z updated 2026-05-16T07:53:25Z
      #   57951574367385 created 2026-05-15T09:46:36Z updated 2026-05-15T16:41:57Z
      #   57946096497945 created 2026-05-15T07:14:11Z updated 2026-05-15T11:03:56Z
      #   57945912065177 created 2026-05-15T07:08:37Z updated 2026-05-15T07:29:50Z
      #   57944849662361 created 2026-05-15T06:41:46Z updated 2026-05-15T07:05:30Z
      #   57828906693401 created 2026-05-12T02:20:25Z updated 2026-05-12T09:19:32Z
      #   57831404063001 created 2026-05-12T03:28:00Z updated 2026-05-12T06:15:42Z
      #   57774849676825 created 2026-05-10T09:51:44Z updated 2026-05-11T01:48:48Z
      #   57773585831833 created 2026-05-10T08:55:04Z updated 2026-05-10T15:04:49Z
      # 全部存在真实差异，非恒等，确认 watermark 可靠。
      # 分类观察值（section 下 name）：Latest updates / Futures events / Spot events / Reward distribution
      # 时间格式：ISO8601 字符串，Z 后缀（UTC）
    FR:
      endpoint: "https://weexsupport.zendesk.com/api/v2/help_center/fr/categories/18540264809497/articles.json"
      method: GET
      headers: {}
      locale_param: "path"   # locale code "fr"（Zendesk locales.json 确认存在，default_locale 是 zh-cn）
      pagination: {type: offset, param: page, page_size_param: per_page, page_size: 30}
      rate_limit_ms: 500
      detail_mode: inline
      has_update_time: true
      strategy: watermark   # 机制与 EN 完全一致，样本 id 56988097353881 created 2026-04-15T07:01:05Z / updated 2026-04-15T07:10:07Z 同样存在差异
      field_mapping:
        article_id: id
        title: title
        content: body
        post_time: created_at
        update_time: updated_at
        category: section_id
  bingx:
    # ============================================================
    # 侦察结论（Phase 1，2026-07-13）：✅ 通，EN/VN。Nuxt 3 SSR（不是 SPA），
    # 数据内嵌在 `<script id="__NUXT_DATA__">` 里（devalue 索引引用格式，需要
    # 简单解析：整数值是同一数组内的索引引用）。列表页首屏只给最新 ~20 条
    # （"Latest Announcements" 分区 total=190），?page=/?sectionId= 等 query
    # 参数不改变 SSR 输出，翻页是客户端交互（未逆向，按时间盒子要求）。
    # 完整历史用 sitemap 替代：en/sitemap-support.xml 有 7829 个 URL，含所有
    # /support/articles/{articleId} 详情页；VN 版本可直接把 EN URL 的 /en/
    # 换成 /vi/ 得到（VN 自己的 sitemap 只有 56 条，不完整，不能单独用）。
    # article_id 跨 locale 一致，可直接做 group_id。
    # createTime vs updateTime 抽样 20 条列表条目，全部逐字节相等，判定
    # strategy: full_scan，用 content_hash 做变更检测。
    # 10 次连续请求 500ms 间隔全部 200，无限流。robots.txt 除个别硬编码文章和
    # 追踪 query 外未禁止 support 路径。
    #
    # 【补充侦察，2026-07-13 同日】核查首屏 ~20 条是否只覆盖 12 个分区之一
    # （担心只拿到 "Latest Announcements" 单一分区）。用 Python 把
    # __NUXT_DATA__ 当合法 JSON 解析（它就是一个扁平数组，整数值是同数组
    # 内的索引引用，可以直接 json.loads 再按下标取值，不需要专门的 devalue
    # 库），还原出 20 条首屏文章各自的 sectionId 索引，再反查 12 个分区定义
    # 对象拿到人类可读名称。结果：这 20 条实际分布在 Latest Promotions /
    # Asset Maintenance / Product Updates / Delisting / Futures Listing 共
    # 5 个不同分区——首屏本来就是跨分区聚合，并非单分区过滤。判定：担心的
    # 覆盖缺口不成立，不需要逐 sectionId 单独抓取。
    # 12 个分区的 sectionId 数值也已全部反查确认（见下方"分区 sectionId 对照
    # 表"），可直接用于 category 字段的人类可读名称映射，不需要另外请求
    # sections[] 列表接口。
    # 同时确认：sitemap（en/sitemap-support.xml）里的 URL 是扁平的
    # /support/articles/{articleId}，不带分区 segment，逻辑上与 Phemex 一致，
    # 天然覆盖全部 12 个分区，全量回填不需要按分区单独跑 sitemap。
    #
    # 【设计要点，供批次 3 实现 BingX collector 时用，2026-07-14 记录】首屏 ~20 条
    # 跨分区聚合视图**不能**当日常增量的数据源用，只能当"取 sectionId"的辅助信息来源
    # （sitemap 的 URL 不带分区信息，sectionId 只有首屏/详情页才有）。原因：首屏窗口是
    # 固定 20 条，一旦当天新增公告超过 20 条，多出来的会被挤出窗口、**永久漏采**（不是
    # "变更检测不到"，是新增条目从未进过 fetch_list 的返回值）。正确的日常增量做法：
    # `fetch_list()` 拉 sitemap 全量 URL 集合，跟 DB 里 `source='BingX'` 已有的
    # `article_id` 集合求差集，差集即新增文章；差集为空的 URL 不需要请求详情页（省网络）。
    # sitemap diff 只能发现"新增"，发现不了"存量文章被编辑但 URL 不变"的场景——如果需要
    # 覆盖这种变更，仍要靠 full_scan 的语义（对已入库文章定期重新请求详情页比对
    # content_hash），可以用首屏 ~20 条兼顾"最近编辑"这个子集（大概率覆盖最新变更），
    # 不需要对全部历史文章都重新请求详情页。
    # ============================================================
    EN:
      endpoint: "https://bingx.com/en/support/notice-center"
      method: GET
      headers: {}
      locale_param: "path"
      pagination: {type: none, note: "首屏仅最新~20条，翻页为客户端交互未逆向；已确认首屏是跨分区聚合（非单分区），完整历史用 sitemap（en/sitemap-support.xml，7829 URL，已确认覆盖全部 12 个分区）枚举 /support/articles/{articleId} 详情页替代"}
      rate_limit_ms: 500
      detail_mode: separate_api   # 列表页只有 title，正文需另请求详情页；详情页本身也是 SSR HTML 内嵌 JSON，非 REST JSON API
      has_update_time: true   # 字段存在，但抽样显示恒等于 post_time，不可靠
      strategy: full_scan   # 抽样 20 条 createTime==updateTime 逐字节相等，watermark 不可靠
      field_mapping:
        article_id: articleId   # 也叫 newArticleId，同值；跨 locale 一致，可做 group_id
        title: title
        content: body   # 仅详情页有，HTML 字符串
        post_time: createTime   # ISO8601 字符串，带 +08:00 偏移
        update_time: updateTime   # 抽样恒等于 createTime，不可靠，仅记录不作水位线
        category: sectionId   # 数值，直接落库进 announcements.raw_category，不做运行时转换；
          # 已确认首屏本身跨分区，无需另查；映射表见 config/category_mapping.yaml（用下方
          # 反查确认过的对照表 ID 直接做 key，Phase 2.6 订正——不要在 collector 里现查
          # 人类可读名称再匹配字符串，见 category_mapping.yaml 顶部注释里 Bitunix/Weex
          # 踩过的坑）
      # update_time 可靠性抽样（20 条列表条目，全部相等，节选 3 条）：
      #   16806751482255  create 2026-07-12T10:58:07.000+08:00  update 相同
      #   16795550869391  create 2026-07-11T00:41:23.000+08:00  update 相同
      #   16182985468559  create 2026-05-20T16:25:44.000+08:00  update 相同
      # 分区 sectionId 对照表（2026-07-13 从 __NUXT_DATA__ 反查确认）：
      #   360004917494 Latest Announcements（首屏聚合视图本身，非文章真实归属分区）
      #   11257060320143 Latest Promotions / 11256997796495 Product Updates /
      #   11257016265487 Asset Maintenance / 11523620946319 System Maintenance /
      #   11257060005007 Spot Listing / 11257015822991 Futures Listing /
      #   13117025062927 Innovation Listing / 11257028004239 Funding Rate /
      #   11257015847311 Delisting / 11257028024847 Crypto Scout /
      #   16083161267343 EventX
      # 首屏 20 条抽样实测分布（2026-07-13）：Latest Promotions / Asset
      #   Maintenance / Product Updates / Delisting / Futures Listing 共
      #   5 个分区都出现过，证实首屏是跨分区聚合，非单分区。
      # 时间格式：ISO8601 字符串，显式 +08:00 偏移（非 UTC）
      # 详情页 endpoint 模式："https://bingx.com/en/support/articles/{articleId}"
    VN:
      endpoint: "https://bingx.com/vi/support/notice-center"
      method: GET
      headers: {}
      locale_param: "path"   # canonical 前缀是 vi（vi-vn 也能用，302/别名到 vi）
      pagination: {type: none, note: "同 EN；VN 自己的 sitemap 不完整（仅56条），需用 EN sitemap 的 articleId 把 URL /en/ 换成 /vi/ 来枚举"}
      rate_limit_ms: 500
      detail_mode: separate_api
      has_update_time: true
      strategy: full_scan   # 与 EN 底层数据一致，仅正文翻译不同
      field_mapping:
        article_id: articleId
        title: title
        content: body
        post_time: createTime
        update_time: updateTime
        category: sectionId
  phemex:
    # ============================================================
    # 侦察结论（Phase 1，2026-07-13）：✅ 通，EN/FR，且是本项目截至目前爬取
    # 最友好的源。服务端渲染（非 SPA），列表页和详情页都内嵌
    # `window.preloadedData = {...}`（JS 对象字面量，key 不带引号、字符串单
    # 引号，不是严格 JSON，需要用宽松解析或简单字符串处理提取，不能直接
    # json.loads）。列表页 query 参数（page/pageNum/p/offset/start）均不改变
    # 输出，翻页是客户端行为；用专用 sitemap 替代：
    # sitemap.xml -> sitemap_output/sitemap_Announcement.xml，EN 3467 条、
    # FR 1816 条文章 URL，且每条 <url> 内含所有 locale 的 hreflang alternate
    # link，一次性拿到跨语言 URL 映射。
    # 3 个分类：News / Activities / Newsletter，各有独立 category id 和
    # 独立 URL（/announcements/news|activities|newsletter）。
    # createdAt/updatedAt 字段抽样 8 条，差异都在 0-28 秒内，判定为 CMS
    # 发布流程噪音而非真实内容变更 -> strategy: full_scan + content_hash。
    # 10 次连续请求 500ms 间隔全部 200，无限流/Cloudflare。
    #
    # 【补充侦察，2026-07-13 同日】最初只配置了 News 分类的 endpoint，
    # Activities（campaign 标签的核心来源）和 Newsletter 被遗漏。已实测补齐：
    #   - EN activities: https://phemex.com/announcements/activities
    #     window.preloadedData.pageData.category = {id:442, name:'Activities'}，
    #     total:476，结构与 News 完全一致（同一套 preloadedData schema）。
    #   - EN newsletter: https://phemex.com/announcements/newsletter
    #     category = {id:452, name:'Newsletter'}，total:12，结构一致。
    #   - FR activities: total:158；FR newsletter: total:4。
    #   fixture: tests/fixtures/phemex_{EN,FR}_{activities,newsletter}.html
    #
    #   sitemap 覆盖性核查（关键结论：sitemap 已经覆盖全部 3 个分类，不需要
    #   按分类单独枚举 sitemap）：实测下载 sitemap_output/sitemap_Announcement.xml
    #   （30MB，22250 个 <loc>），EN 去重后 3485 条 unique /announcements/{slug}
    #   URL，FR 1834 条。对比：EN News(2927) + Activities(476) + Newsletter(12)
    #   = 3415，与 sitemap 的 3485 高度吻合（差值来自少量历史/待验证条目）；
    #   FR News(1641)+Activities(158)+Newsletter(4)=1803，与 sitemap 1834 同样吻合。
    #   抽样验证：activities 分类下的文章 slug（如
    #   epic-launch-50000-phemex-futures-lucky-draw-6th-trade-spin-is-20260611062604）
    #   和 newsletter 分类下的文章 slug（phemex-pulse-newsletter-april-2022）均能在
    #   sitemap 里找到——因为所有分类文章共享同一个扁平 /announcements/{slug} 路径，
    #   不带分类 segment，sitemap 天然是全量的。Phase 2 全量回填仍然只需要一份
    #   sitemap，无需按分类单独下载。
    # ============================================================
    EN:
      categories:
        news:
          endpoint: "https://phemex.com/announcements/news"
          category_id: 432
        activities:
          endpoint: "https://phemex.com/announcements/activities"
          category_id: 442   # campaign 标签的核心来源，Phase 1 首版遗漏，2026-07-13 补齐
        newsletter:
          endpoint: "https://phemex.com/announcements/newsletter"
          category_id: 452
      method: GET
      headers: {}
      locale_param: "path"
      pagination: {type: none, note: "列表页 query 参数不生效，翻页为客户端行为；完整文章列表（含全部 3 个分类）用 sitemap_output/sitemap_Announcement.xml（EN 3485 条去重 URL，已验证覆盖 News/Activities/Newsletter）替代"}
      rate_limit_ms: 500
      detail_mode: inline   # 详情页 window.preloadedData.pageData 已含完整正文，一次请求即可
      has_update_time: true   # 字段存在，但抽样显示只是发布流程级别的秒级噪音，不可靠
      strategy: full_scan   # 抽样 8 条 createdAt/updatedAt 仅相差 0-28 秒，非真实编辑，watermark 不可靠
      field_mapping:
        article_id: id   # 每个 locale 有各自数值 id；i18n.<locale> 给出各语言版本的 id
        title: title
        content: content   # 详情页 preloadedData.pageData.content，HTML 正文
        post_time: publishedTime   # 朴素字符串 'YYYY-MM-DD HH:MM:SS'，无显式时区，数值上与 UTC 的 createdAt 接近，按 UTC 处理；另有 i18n.createdAt 是标准 ISO8601 UTC
        update_time: i18n.updatedAt   # ISO8601 UTC，抽样显示只是秒级发布噪音，不用于水位线
        category: category.name   # ⚠️ Phase 2.6 订正：不要真的把这个字段存进
          # announcements.raw_category——category.name 是 locale 相关的翻译文本
          # （下方 FR 块已经记录 name:'Nouvelles' 跟 EN 的 'News' 不是同一个字符串，
          # i18n 各 locale 独立编号），照抄的话 config/category_mapping.yaml 就得
          # 每个 locale 各写一份、还要覆盖所有语言翻译，重演 Bitunix/Weex 用人类
          # 可读名称当 key 踩过的坑。批次 3 实现时改成落库"抓取时用的哪个
          # categories.* 子源 key"（news/activities/newsletter，locale 无关，
          # sources.yaml 配置里的字面量，采集时天然知道，不需要解析这个响应字段）。
          # category_mapping.yaml 已经按这个设计提前写好（phemex 块用
          # news/activities/newsletter 做 key）。另有 categoryKey，如
          # "AnnouncementCategory432"，同样是 locale 相关，不适合做 key
      # update_time 可靠性抽样（8 条，createdAt vs updatedAt vs publishedTime，UTC）：
      #   new-contract-listing-gnsusdt  created 2023-08-09T01:55:49.196Z  updated 2023-08-09T01:55:49.210Z（+14ms）
      #   phemex-will-delist-4-trading-pairs-on-december-5-2025  created 2025-12-03T06:45:39.825Z  updated 2025-12-03T06:54:22.969Z（+8m43s，发布流程内)
      #   dydx-network-upgrade-on-january-30-2026  created 2026-01-29T08:57:18.950Z  updated 2026-01-29T09:25:09.020Z（+28m，发布流程内）
      #   其余 5 条差异均在 0-2 秒内
      # 分类观察值：News（id 432，total 2927）/ Activities（id 442，total 476）/ Newsletter（id 452，total 12）
      # 时间格式：createdAt/updatedAt 为 ISO8601 UTC（Z 后缀）；publishedTime 为朴素 'YYYY-MM-DD HH:MM:SS'（按 UTC 处理）
      # 详情页 endpoint 模式："https://phemex.com/announcements/{slug}"
    FR:
      categories:
        news:
          endpoint: "https://phemex.com/fr/announcements/news"
          category_id: 438   # 实测 tests/fixtures/phemex_FR.html 确认，name:'Nouvelles'（与 EN 432 不同，i18n 独立编号）
        activities:
          endpoint: "https://phemex.com/fr/announcements/activities"
          category_id: 448
        newsletter:
          endpoint: "https://phemex.com/fr/announcements/newsletter"
          category_id: 458
      method: GET
      headers: {}
      locale_param: "path"
      pagination: {type: none, note: "同 EN；完整列表（含全部 3 个分类）用同一个 sitemap_Announcement.xml 里的 FR hreflang 链接（1834 条去重 URL，已验证覆盖 News/Activities/Newsletter）"}
      rate_limit_ms: 500
      detail_mode: inline
      has_update_time: true
      strategy: full_scan   # 与 EN 同一套底层数据和噪音模式
      field_mapping:
        article_id: id   # 与 EN 同一篇文章的 id 不同（locale 各自独立数值 id），靠 i18n map 或 slug 关联
        title: title
        content: content
        post_time: publishedTime
        update_time: i18n.updatedAt
        category: category.name   # 同 EN：⚠️ 同样不要直接落库，见上方 EN 块订正说明
      # 分类观察值：News（total 1641）/ Activities（id 448，total 158）/ Newsletter（id 458，total 4）
  lbank:
    # ============================================================
    # 侦察结论（Phase 1，2026-07-13）：✅ 通，所有 3 个 locale。
    # www.lbank.com（canonical 域名，Next.js App Router SSR，Cloudflare 前置但
    # 不拦截 curl）。列表页是服务端渲染的 HTML，正文数据以转义 JSON 形式内嵌在
    # RSC streaming script（`self.__next_f.push(...)`）里，不是独立 JSON API。
    # 列表页第 1 页（10 条）可稳定拿到，content 字段已内嵌完整正文；但
