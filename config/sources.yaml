    # "变更检测不到"，是新增条目从未进过 fetch_list 的返回值）。原计划的日常增量做法：
    # `fetch_list()` 拉 sitemap 全量 URL 集合，跟 DB 里 `source='BingX'` 已有的
    # `article_id` 集合求差集，差集即新增文章；差集为空的 URL 不需要请求详情页（省网络）。
