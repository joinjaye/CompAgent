      #   16806751482255  create 2026-07-12T10:58:07.000+08:00  update 相同
      #   16795550869391  create 2026-07-11T00:41:23.000+08:00  update 相同
      #   16182985468559  create 2026-05-20T16:25:44.000+08:00  update 相同
      # 分区 sectionId 对照表（2026-07-13 从 __NUXT_DATA__ 反查确认）：
      #   360004917494 Latest Announcements（首屏聚合视图本身，非文章真实归属分区）
      #   11257060320143 Latest Promotions / 11256997796495 Product Updates /
      #   11257016265487 Asset Maintenance / 11523620946319 System Maintenance /
      #   11257060005007 Spot Listing / 11257015822991 Futures Listing /
      #   13117025062927 Innovation Listing / 11257028004239 Funding Rate /
      #   11257015847311 Delisting / 11257028024847 Crypto Scout /
      #   16083161267343 EventX
      # 首屏 20 条抽样实测分布（2026-07-13）：Latest Promotions / Asset
      #   Maintenance / Product Updates / Delisting / Futures Listing 共
      #   5 个分区都出现过，证实首屏是跨分区聚合，非单分区。
      # 时间格式：ISO8601 字符串，显式 +08:00 偏移（非 UTC）
      # 详情页 endpoint 模式："https://bingx.com/en/support/articles/{articleId}"
      # 【2026-07-20 新增 campaign_endpoint，见 CLAUDE.md「补充活动类内容采集端口」】
      # /events 活动中心页面纯客户端渲染（跟本文件其它注释里记录的 BingX 签名保护
      # 是同一堵墙：真实请求确认背后是 `GET api-app.qq-os.com/api/act-operation/
