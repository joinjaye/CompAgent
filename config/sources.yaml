    # 不拦截 curl）。列表页是服务端渲染的 HTML，正文数据以转义 JSON 形式内嵌在
    # RSC streaming script（`self.__next_f.push(...)`）里，不是独立 JSON API。
    # 列表页第 1 页（10 条）可稳定拿到，content 字段已内嵌完整正文；但
    # ?pageNo=2 / ?page=2 均被忽略，翻页是客户端交互驱动，未逆向出真实调用
    # （按时间盒子要求，未继续深挖）。detail 页（/support/articles/{code}）
    # 是另一个 SSR 页面，额外提供 createTime/updateTime（unix ms）两个字段，
    # 这两个字段列表页没有（列表页只有 contentShowTime，与 detail updateTime
    # 不完全相同，抽样发现最多相差 ~22 分钟，不能替代）。
    # 抽样 8 条 detail 页 createTime vs updateTime：7/8 存在真实差异（另 1 条
    # 相等），detail 页字段本身是可靠的。
    # 【Phase 2.5 订正，2026-07-14】首版侦察据此判定 strategy: watermark，但这个
    # 判断只看了"updateTime 字段是否可靠"，没考虑"能否只拉增量"——Lbank 列表页
    # 翻页未逆向（见下方"未验证/待办"），每轮采集实际只能稳定拿到默认聚合视图
    # 固定的最新 10 条，不存在"用 since 只请求增量"的空间，watermark 策略的核心
    # 前提（可控翻页范围）不成立。改判 strategy: full_scan：每轮固定拉这 10 条，
    # 用 content_hash 做变更检测；detail 页 updateTime 仍然落库（可靠、有信息量），
    # 只是不参与"要不要继续翻页"的决策，跟 Zoomex 的 high_watermark 是同一类
    # "仅供观测，不参与采集决策"（见本文件 zoomex 块注释）。与 README/phasePrompts.md
    # 原始设计以及 CLAUDE.md 数据源现状表保持一致（CLAUDE.md 之前把这行错记成了
    # watermark，本次一并订正）。
    # 10 次连续请求 500ms 间隔，全部 200，无限流/Cloudflare 拦截。
    # robots.txt 允许 /support/announcement 与 /support/articles/*，只禁止
    # /my/*、/wallet/* 和追踪 query 参数。
    # 加分发现：同一条公告的 noticeId/code 在 EN/VN/ID 三个 locale 完全一致，
    # 可直接作为跨语言 group_id，不需要模糊匹配。
    # 未验证/待办：翻页 API 未逆向（只能稳定拿到最新 10 条，需要后续 Phase
    # 用 headless browser 或继续找客户端分页请求）；列表页原始 payload 未
    # 观察到 per-item 的 category 字段（只有页面级 tabs 列表），按 tab 筛选后
    # 是否带 category 字段未验证。
    #
    # 【补充侦察，2026-07-13 同日】尝试确认默认页面（首页 10 条）之外，7 个
    # 页面级 tab（LBank VIP / New Listings / Event Announcements / System
    # Upgrades & Maintenance / Platform Updates / Delisting Information /
    # Fiat）能否单独抓取。
    #   - 找到了完整分类代码树：每个 tab 对应一个 code（如 CO00000053=New
    #     Listings、CO00000058=Event Announcements、CO00000064=System
    #     Upgrades & Maintenance、CO00000069=Platform Updates、
    #     CO00000129=LBank VIP、CO00000057=Delisting Information、
    #     CO00000063=Fiat），且每个顶层 tab 下还有子分类（如 New Listings
    #     下有 Spot/Futures/Copy Trading Listings 三个子码），来自页面里
    #     `noticeCategories` 这棵完整分类树，可直接用于 Phase 3 的 category
    #     字段人类可读名称映射。
    #   - 但实测 curl 三种 URL 均确认**不返回文章列表**（只返回分类导航壳，
    #     0 条 noticeId）：父分类页 `/support/sections/CO00000053`、叶子子
    #     分类页 `/support/sections/CO00000054`、以及首页对应的聚合视图
    #     `/support/sections/latest-news/notice`。也测试了在默认首页 URL
    #     后加 `?categoryCode=CO00000053` 查询参数，返回的 `latestNews.
    #     page.categoryCode` 仍然是 `null`（参数被忽略），结果和不加参数时
    #     完全一样。
    #   - 结论：按 tab 筛选文章列表**不是**简单 URL 参数能做到的，真实的
    #     筛选请求发生在客户端 hydration 之后（未在页面源码里找到对应的
    #     REST/GraphQL 调用），维持 Phase 1 原判断——只能稳定拿到默认聚合
    #     视图的最新 10 条，按 tab 筛选需要 headless browser 才能抓到真实
    #     的客户端请求。
    #
    # 【2026-07-14 彻底重写：找到真实匿名 JSON API，见 CLAUDE.md「Lbank 真实 API
    # 重写」】上面记录的"翻页未逆向、只能拿默认聚合视图 10 条"的结论已被推翻——
    # 用户要求投入一次 headless browser 抓包（跟当年破解 Zoomex SPA 同样的方法）
    # 后，找到了页面 hydration 之后真正调用的接口，均匿名可访问、不需要 cookie/
    # 签名：
    #   - 列表：POST https://www.lbank.com/lbk-api/huamao-media-center/notice/latestList
    #     body {"pageNo":N,"pageSize":M,"topCategory":"NOTICE","categoryCode":"<code>"}
    #     真正支持翻页（pageNo 递增返回完全不同的条目，已用真实请求验证 page1/page2
    #     无重叠）、真正支持分类筛选（categoryCode 传顶层 code 会聚合其全部子分类，
    #     如 "CO00000053" New Listings 聚合 Spot/Futures/Copy Trading 三个子分类，
    #     total=6909，远超默认视图的 10 条）。响应里每条已经带完整 content（纯文本，
    #     真实抽样比对跟详情接口的正文实质一致，字符数几乎相等，不存在截断）。
    #   - 详情：GET .../notice/content/{code}?noticeCode={code}，返回
    #     noticeContent.columnId（叶子分类数值 id，可靠）+ createTime/updateTime
    #     （均 unix 毫秒，可靠，抽样确认非 Phase 1 那批 8 条历史数据的重复）。
    #     content 字段本身是指向另一域名（jiz.lbank.com）静态文本文件的 URL，不是
    #     字面量，本项目不解析这个字段（列表接口的 content 已经够用，见
    #     src/parsers/lbank.py 顶部说明）。
    #   - 分类树：POST .../notice/category/list body {"topCategory":"NOTICE"}，
    #     返回 7 个顶层 tab（categoryId/code 跟 Phase 1 补充侦察记录的页面级 tab
    #     代码树完全对上：129 LBank VIP / 53 New Listings / 58 Event Announcements /
    #     64 System Upgrades & Maintenance / 69 Platform Updates / 57 Delisting
    #     Information / 63 Fiat），每个顶层 tab 下还有子分类（如 53 下有 54 Spot
    #     Listings/55 Futures Listings/56 Copy Trading Listings）。
    #   - 语言切换：**不是**标准 `Accept-Language` 请求头（实测传 "id" 无效，
    #     仍返回英文），是应用自定义头 `ex-language`，三个值均已真实验证生效：
    #     `en-US`/`vi-VN`/`id`。
    #   - 分页规模：pageSize 实测最高测到 100（接受，无报错），totalPage 按
    #     total/pageSize 正确换算。
    #   - robots.txt 未检查这批 `/lbk-api/*` 路径（API 域名与页面同域，一般
    #     API 路径不受页面级 robots 规则约束，且行为等同于用户浏览器正常加载
    #     该页面时的请求，未绕过任何访问限制）。
    # 类目粒度：按 7 个顶层 tab 采集（categoryCode 传顶层 code，服务端自动聚合
    # 全部子分类），不逐子分类单独请求——跟 Weex 用 category 级聚合（而不是
    # section 级）是同一个设计选择。`raw_category` 落库详情接口给的 columnId
    # （叶子分类数值 id，比顶层 categoryCode 更精确），跟 Weex 用真实 section_id
    # 做 raw_category 是同一个惯例（Weex 也是按 category 级聚合采集，但
    # raw_category 记的是每条真正的 section_id）。
    # ============================================================
    EN:
      endpoint: "https://www.lbank.com/lbk-api/huamao-media-center/notice/latestList"
      detail_endpoint: "https://www.lbank.com/lbk-api/huamao-media-center/notice/content/{code}?noticeCode={code}"
        # 【2026-07-15 简化】采集器（src/collectors/lbank.py）已不再调用这个
        # endpoint——updateTime 对 full_scan 策略没有作用，columnId 的精度超过
        # 下游需要的粒度。字段本身保留（字符串没有错，只是当前未被使用），供以后
        # 需要更细粒度分类时参考，见 CLAUDE.md「Lbank 真实 API 重写」末尾追加记录。
      lang_header: "en-US"
      locale_path: ""   # 公开文章 URL 前缀（拼 group_id 之外的展示用 url 字段），EN 无前缀
      categories:
        lbank_vip:
          category_code: "CO00000129"
        new_listings:
          category_code: "CO00000053"
        event_announcements:
          category_code: "CO00000058"
        system_maintenance:
          category_code: "CO00000064"
        platform_updates:
          category_code: "CO00000069"
        delisting_information:
          category_code: "CO00000057"
        fiat:
          category_code: "CO00000063"
      method: POST
      headers: {"Content-Type": "application/json"}
      pagination: {type: page_number, page_size: 50, max_pages: 2}   # daily 增量默认
        # 只翻前 2 页；--force-full 忽略这个上限，翻到 resultList 返回空为止
      rate_limit_ms: 500
      detail_mode: separate_api   # 【2026-07-15 起字段名不再准确，见上方 detail_endpoint 注释】
        # 详情接口已不再被调用，采集器不发这次请求；保留这个字段值不改动，避免动到
        # probe 模块对 detail_mode 的读取语义（只有 "blocked" 是有实际行为的取值）
      has_update_time: false   # 【2026-07-15 由 true 改为 false】详情接口本身可靠，但已不再调用，
        # update_time 现在恒为 NULL——这是有意为之（full_scan 策略不依赖它），不是数据缺陷
      strategy: full_scan   # latestList 默认按 noticeId 降序（等价创建顺序），非 updateTime，
        # 不能安全依赖排序做提前退出翻页判断编辑变更（同 Zoomex 批次 2 教训），变更检测交给 content_hash
      field_mapping:
        article_id: noticeId   # 另有 code（长数字字符串），用于详情接口 URL/展示 URL，二者等价
        title: title   # 列表接口字段，已经是干净文本（不带高亮模板标记）
        content: content   # 列表接口字段，纯文本（偶有 HTML 实体），真实抽样确认跟详情接口正文实质一致、非截断
        post_time: contentShowTime   # 列表接口字段，unix ms
        update_time: updateTime   # 【2026-07-15 起不再落库，见上方 has_update_time 注释】字段名保留供参考
        category: category_code   # 【2026-07-15 由 columnId 改为 category_code】raw_category 现在
          # 直接落请求时用的顶层 categoryCode（如 "CO00000053"），不再是详情接口的叶子 columnId
      # 真实验证记录（2026-07-14）：
      #   pageNo=1 vs pageNo=2（pageSize=15，categoryCode=null）：noticeId 完全不重叠
      #     （page1: 17021~17009，page2: 17006~16991）
      #   categoryCode=CO00000054（Spot Listings，New Listings 子分类）：返回条目标题
      #     均为 "X Will Be Listed on LBank"，跟 Bitunix/Weex 用真实 title 核对映射
      #     的方法一致
      #   categoryCode=CO00000053（New Listings 顶层）：total=6909，条目分布在
      #     Spot/Futures/Copy Trading 三个子分类，确认顶层 code 自动聚合子分类
      #   ex-language 头分别传 en-US/vi-VN/id，响应 langCode 逐一对应正确切换
      # 7 个顶层分类真实 total（categoryCode=顶层 code，pageSize=5 探测）：
      #   129 LBank VIP: 1 / 53 New Listings: 6909 / 58 Event Announcements: 2754 /
      #   64 System Upgrades & Maintenance: 3422 / 69 Platform Updates: 523 /
      #   57 Delisting Information: 796 / 63 Fiat: 59
      # 时间格式：unix 毫秒，UTC
      # 【2026-07-20 新增 campaign_endpoint，见 CLAUDE.md「补充活动类内容采集端口」】
      # 常规 7 个顶层分类的 notice/latestList API 覆盖的是公告，验证后发现精选
      # 活动落地页（www.lbank.com/new-popular-events）上很多活动内容根本不在
