    # createTime vs updateTime 抽样 20 条列表条目，全部逐字节相等，判定
    # strategy: full_scan，用 content_hash 做变更检测。
    # 10 次连续请求 500ms 间隔全部 200，无限流。robots.txt 除个别硬编码文章和
