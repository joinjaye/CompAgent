# ============================================================
# 数据源配置模板
# 由 Phase 1（数据源侦察）填充。本文件中的值必须来自实测的 curl 请求结果，
# 严禁凭记忆或猜测填写 API 地址 / 字段映射。
#
# 字段说明：
#   endpoint        公告列表接口 URL。若该源没有 JSON API，只有网页，则留空，
#                   detail_mode 记为 html，不要伪造 API。
#   method          GET / POST
#   headers         必要的请求头（如 User-Agent、Accept-Language）。
#                   敏感凭证（如需要）不要写在这里，走 .env。
#   locale_param    locale 如何传递给接口：
#                     "path"          —— 拼在 URL path 里（如 /en/announcements）
#                     "query:<key>"   —— query 参数，如 "query:lang"
#                     "header:<key>"  —— 请求头，如 "header:Accept-Language"
#   pagination      分页机制，如：
#                     {type: offset, param: page, page_size: 20}
#                     {type: cursor, param: cursor}
#   rate_limit_ms   请求间隔毫秒数（合规限速，Phase 1 通过连续请求观察后确定）
#   detail_mode     inline         —— 列表接口已含正文，无需再请求详情
#                   separate_api   —— 需另外请求详情接口取正文
#                   html           —— 仅有网页，无 JSON API（服务端渲染，可直接抓 HTML 正文）
#                   blocked        —— 该源受阻（如纯客户端渲染 SPA、需要登录、Cloudflare 拦截等），
#                                   见对应条目上方注释里记录的受阻原因和已尝试方法
#   has_update_time 源端是否提供可靠的 update_time / updated_at 等字段。
#                   Phase 1 需抽样 5-10 条核对：若 update_time 与 post_time 全部相同，
#                   视为不可靠，标 false 并令 strategy=full_scan；
#                   若存在差异，标 true，strategy=watermark。
#   strategy        watermark / full_scan，与 has_update_time 的判断一致，Phase 1 填。
#   field_mapping   响应字段 -> 本地字段名的映射（article_id / title / content /
#                   post_time / update_time / category 分别对应响应里的哪个 key）。
# ============================================================

sources:
  bitunix:
    # ============================================================
    # 侦察结论（Phase 1，2026-07-13）：✅ 通，EN/FR/ID。注意：真实公告中心不在
    # www.bitunix.com 主站（那是 Cloudflare WAF 保护的 Nuxt SPA，其 CMS 后端
    # platformgateway.bitunix.com 对所有路径返回 403 "Access restricted"，
    # curl 无法绕过，判定该路径死路，不值得为此上 headless browser）。真实可
    # 抓取的公告内容在 Bitunix 的 **Zendesk Help Center**：
    # support.bitunix.com，Announcements 分类 id=13760946490649。
    # 标准 Zendesk Help Center REST API，公开匿名可访问，/api/v2/ 路径没有
    # Cloudflare 挑战（/hc/ 的 HTML 页面有挑战，但 API 没有）。
    # 抽样 30 条 EN 文章（按 position 排序），29/30 updated_at != created_at，
    # 且有真实的跨天/多天差异 -> strategy: watermark，用 updated_at 做水位线，
    # 服务端原生支持 ?sort_by=updated_at&sort_order=desc 排序，适合轮询。
    # 另有 edited_at 字段（仅内容正文编辑时间），多数抽样与 created_at 相等，
    # 说明 updated_at 会被 metadata-only 变更（如分类/位置调整）触发，是超集
    # 信号而非精确内容变更信号 —— 因此仍按项目设计用 content_hash 做二次校验。
    # per_page 最高测到 100（Zendesk 常见上限）。10 次连续请求 500ms 间隔全部
    # 200，无限流/Cloudflare 挑战。robots.txt 未禁止本接口路径。
    # ============================================================
    EN:
      endpoint: "https://support.bitunix.com/api/v2/help_center/en-us/categories/13760946490649/articles.json"
      method: GET
      headers: {}
      locale_param: "path"   # Zendesk 自己的 locale code，如 en-us / fr / id，拼在 path 里
      pagination: {type: cursor, page_size: 100}   # Phase 2.7: JSON:API cursor 分页，见 zendesk_base.py 顶部注释
      rate_limit_ms: 500
      detail_mode: inline   # 列表 body 字段已含完整正文 HTML（实测 34-55KB），无需再请求详情
      has_update_time: true
      strategy: watermark   # 支持 ?sort_by=updated_at&sort_order=desc，抽样 29/30 存在真实差异
      field_mapping:
        article_id: id   # 数值，跨 locale 一致，可直接做 group_id
        title: title
        content: body   # HTML 字符串
        post_time: created_at   # ISO8601 UTC，Z 后缀
        update_time: updated_at   # ISO8601 UTC；另有 edited_at（仅内容编辑），updated_at 是超集信号
        category: section_id   # 数值，直接落库进 announcements.raw_category，不做运行时转换。
          # Zendesk section_id 跨 locale 一致（已用 bitunix_FR.json 交叉验证），映射表见
          # config/category_mapping.yaml（Phase 2.6 已用真实 sections.json 验证过全部 8 个值）
      # update_time 可靠性抽样（30 条，EN，节选 5 条，完整见 recon 记录）：
      #   59923371883417  created 2026-07-11T00:45:26Z  updated 2026-07-13T00:24:06Z  差异
      #   59908400363161  created 2026-07-10T10:08:39Z  updated 2026-07-10T10:13:53Z  差异
      #   59645135417497  created 2026-07-03T10:29:04Z  updated 2026-07-03T10:29:04Z  相等（1/30）
      #   59530587129497  created 2026-06-30T09:46:11Z  updated 2026-07-10T02:24:53Z  差异
      #   59350723768857  created 2026-06-25T03:24:44Z  updated 2026-06-27T12:56:27Z  差异
      #   29/30 存在真实差异，确认 watermark 可靠
      # 分类观察值（section_id -> EN name）：16707858318105 Products and Services /
      #   13762039477017 Events and Activities / 13762037166105 New Listings /
      #   17983093824153 Derivatives & Perpetual Futures / 57068501750297 Earn /
      #   39073446124953 Copy Trading / 47601070306585 Delisting /
      #   13762058994073 Maintenance and Upgrade
      # 时间格式：ISO8601 字符串，Z 后缀（UTC）
      # www.bitunix.com 主站 SPA + platformgateway.bitunix.com 已确认为死路（403，
      # Cloudflare 拦截），不作为该源的 endpoint 候选。
      # 【2026-07-20 新增 campaign_endpoint，见 CLAUDE.md「补充活动类内容采集端口」】
      # 常规 Zendesk 公告流只覆盖 "Events and Activities" 这一个 section，验证后
      # 发现活动中心页面（www.bitunix.com/activity/act-center，独立 Nuxt 应用，跟
      # 上面已确认死路的 platformgateway.bitunix.com 不是一回事）上很多活动内容
      # 根本不在这条公告流里出现过。真实请求确认 EN 用 devalue 编码的
      # __NUXT_DATA__，单次请求同时返回 ongoing+ended 两个列表；?page=2 会让这
      # 两个 key 从响应里整个消失，是固定单页视图，不是真分页，解析细节见
      # src/parsers/bitunix_activity.py 顶部注释。
      campaign_endpoint:
        endpoint: "https://www.bitunix.com/activity/act-center"
        pagination: {type: none, note: "固定单页视图，?page=2 会让数据整个消失，非真分页"}
        rate_limit_ms: 500
        strategy: full_scan   # 没有可靠的"最后编辑时间"，只有活动起止时间，变更检测交给 content_hash
    FR:
      endpoint: "https://support.bitunix.com/api/v2/help_center/fr/categories/13760946490649/articles.json"
      method: GET
      headers: {}
      locale_param: "path"
      pagination: {type: cursor, page_size: 100}   # Phase 2.7: JSON:API cursor 分页，见 zendesk_base.py 顶部注释
      rate_limit_ms: 500
      detail_mode: inline
      has_update_time: true
      strategy: watermark   # 机制与 EN 完全一致
      field_mapping:
        article_id: id
        title: title
        content: body
        post_time: created_at
        update_time: updated_at
        category: section_id
      # campaign_endpoint：FR 数据格式跟 EN 不同（明文 window.__custom__nuxt__payload，
      # 不是 devalue），真实核对过标题/规则是翻译版本，解析逻辑见
      # src/parsers/bitunix_activity.py（dual-path，同一份代码处理两种格式）。
      campaign_endpoint:
        endpoint: "https://www.bitunix.com/fr-fr/activity/act-center"
        pagination: {type: none, note: "同 EN，固定单页视图"}
        rate_limit_ms: 500
        strategy: full_scan
    ID:
      endpoint: "https://support.bitunix.com/api/v2/help_center/id/categories/13760946490649/articles.json"
      method: GET
      headers: {}
      locale_param: "path"
      pagination: {type: cursor, page_size: 100}   # Phase 2.7: JSON:API cursor 分页，见 zendesk_base.py 顶部注释
      rate_limit_ms: 500
      detail_mode: inline
      has_update_time: true
      strategy: watermark
      field_mapping:
        article_id: id
        title: title
        content: body
        post_time: created_at
        update_time: updated_at
        category: section_id
      campaign_endpoint:
        endpoint: "https://www.bitunix.com/id-id/activity/act-center"
        pagination: {type: none, note: "同 EN，固定单页视图；ID 也走明文 __custom__nuxt__payload 格式"}
        rate_limit_ms: 500
        strategy: full_scan
  weex:
    # ============================================================
    # 【2026-07-14 数据源迁移侦察，详见 CLAUDE.md「Weex 数据源迁移」】原 Phase 1/2/2.7
    # 侦察确认可用的 weexsupport.zendesk.com 公开 Zendesk REST API **已经过期**：真实
    # 请求核对（3 个 endpoint、6 个已知 section、en-us/zh-cn/fr 三个 locale 交叉验证）
    # 确认该 API 从 2026-05-16 起再没有更新过任何内容，但用户反馈 www.weex.com/help
    # 前台页面能看到当天发布的公告，实测坐实：真实数据源已经切换成 www.weex.com 自己的
    # Next.js SSR 前台（不是 weexsupport.zendesk.com 代理），且没有任何可发现的 JSON/
    # XHR 接口（Playwright 抓包为空——内容是服务端直接渲染进 HTML 的，不是前端另发请求
    # 拿到的）。当时判定"这是第三方 Zendesk 托管接口，理论上存在 Weex 未来迁移掉
    # Zendesk 的风险"这条 Phase 1 记录的风险已经真实发生。
    #
    # 新方案：解析 www.weex.com/{locale}/help/... 页面里内嵌的两类数据（完整技术细节
    # 见 src/parsers/weex_web.py 顶部注释）：
    #   - 列表页（category 或 section 皆可）：数据在 Next.js React Server Components
    #     的 flight 流文本里（<script>self.__next_f.push([1,"..."])</script>），含
    #     articleListData 数组（article_id/title/createdAt/sectionId/prioritise/url）
    #     + pageInfo/totalCount/totalPage。
    #   - 详情页：正文直接是服务端渲染好的 HTML，在 <div class="zendesk-html">
    #     里，不需要解析 flight 流，摘出这个 div 内层 HTML 交给已有的
    #     html_text.py 转纯文本即可（跟 Bitunix/Weex 旧数据同一套转换器）。
    #   两者都是普通 HTTP GET + ?page=N 查询参数即可翻页，**不需要 headless
    #   browser**（Playwright 只在这次侦察阶段用来确认"没有可发现的 XHR 接口"这个
    #   事实，日常采集全程 urllib 就够，跟 Zoomex 当年的侦察模式一致）。
    #
    # sectionId 沿用旧 Zendesk 的数值体系（新系统仍然把这套 taxonomy 当分类用，只是
    # 文章内容/发布走了新管线），config/category_mapping.yaml 现有的 weex 映射对新
    # 数据直接适用。改用 category 级聚合页（而不是逐个已知 section 去拉）额外发现了
    # 一个旧 Zendesk sections.json 里根本查不到的新 section
    # （608152974386「All about TradFi」，6 篇，真实标题抽样是费率类公告与 FAQ
    # 混杂——"TradFi futures zero-fee promotion ends"、"Fee Adjustment
    # Announcement" 属公告性质，其余是产品说明，已按整体基调映射为 product，见
    # category_mapping.yaml 注释）——这也是选用 category 级聚合而不是硬编码已知
    # section 列表的原因：能自动发现新分区，不会静默漏采，这是本次踩过 Phase 2.7
    # 同类坑（当时是撞见 Weex Listings/Delistings 完全没被采集）之后才吸取的教训。
    #
    # 无 per-item update_time（列表条目只有 createdAt，没有任何"最后编辑"字段），
    # strategy 改判 full_scan：content_hash 兜底检测变更，跟 BingX/Phemex/Lbank 是
    # 同一类源，不写 crawl_state.high_watermark。列表条目有 prioritise（置顶）标记，
    # 置顶文章可能不按时间顺序排在最前——不依赖排序做提前退出翻页（同 Zoomex 批次 2
    # 教训，见 CLAUDE.md「Phase 2 批次 2」），只用 pagination.max_pages 限制每轮扫描
    # 深度；--force-full 时忽略这个上限、翻到 totalPage 为止（同 Zoomex daily 增量
    # 补丁设计）。
    #
    # locale 路径 segment 是 weex.com 自己的路由 code（en/fr/vi/id/zh-CN...），跟旧
    # Zendesk locale code（en-us/fr）是两套不同体系，均已用真实请求验证 200 且各自
    # 返回对应语言标题。项目范围只需要 EN/FR（与既定竞品语言范围一致），vi/id 虽然
    # 也有内容但不在范围内，未采集。
    #
    # 分类端点（category 级聚合，覆盖该 category 下全部 section，含未知新 section）：
    #   Latest Announcements: category_id=18540264809497，总量约 1091 条 / 17 页
    #   Listings/Delistings:  category_id=44507081559193，总量约 3688 条 / 57 页
    # P2P Announcement 维持 section 级（section_id=49365180202777，20 条 / 1 页），
    # 不能用其所在的「P2P Trading」category 聚合页（会混入另外 3 个纯 FAQ section，
    # 同 Phase 2.7 结论）。
    #
    # 【2026-07-20 新增，见 CLAUDE.md「Weex 补充 section 采集」】用户指定核实
    # www.weex.com/help/sections/18540289930137——真实请求确认这个 section
    # （name="Latest updates"）隶属 category_id=18540264809497，也就是已经在采集
    # 的 latest_announcements 聚合端点下面。但真实请求同时确认该 category 下至少
    # 还有 "Futures events"/"Spot events"/"Rewards"/"TradFi" 等 5+ 个 section 混在
    # 一起翻页，而 daily 增量固定只翻前 2 页（130 条/天，跨全部 section 的聚合
    # 窗口）；这一个 section 自己就有 252 条（EN，4 页）/ 207 条（FR，4 页）——
    # 单独一个 section 的体量已经接近聚合窗口的 2 倍，日常增量必然被严重稀释，
    # 跟当年把 p2p_announcement 从 "P2P Trading" 拆成专属 section 端点是同一类
    # 问题。改为额外加一个专属 section 端点（跟聚合端点并集写入同一个 source，
    # article_id 天然同一空间，upsert_announcement 自动去重，不会产生重复行）。
    #
    # robots.txt（www.weex.com/robots.txt）明确 Disallow 了两篇文章
    # （/help/articles/f8gmpz85kfw6teot9f9xpa09、/help/articles/gqv1v2r402ocvucwvllzz0mj），
    # collector 遇到这两个 article_id 会跳过不抓（见 weex.py DISALLOWED_ARTICLE_IDS）；
    # 其余 /help/* 路径 robots.txt 允许。连续 6 次请求间隔 500ms 全部 200，未观察到
    # 限流；单页 HTML 响应体比旧 Zendesk JSON 接口重得多（~650KB/页），予以保留同样
    # 的 500ms 节奏，不做更激进的并发。
    # ============================================================
    EN:
      locale_path: "en"
      categories:
        latest_announcements:
          endpoint: "https://www.weex.com/en/help/categories/18540264809497"
        listings_delistings:
          endpoint: "https://www.weex.com/en/help/categories/44507081559193"
        p2p_announcement:
          endpoint: "https://www.weex.com/en/help/sections/49365180202777"
        latest_updates:
          endpoint: "https://www.weex.com/en/help/sections/18540289930137"
      method: GET
      headers: {}   # 匿名可访问，无需鉴权头；仅用普通浏览器 User-Agent 测试过
      pagination: {type: query_page, page_size: 65, max_pages: 2}   # daily 增量默认只
        # 翻前 2 页；--force-full 忽略这个上限，翻到 totalPage 为止
      rate_limit_ms: 500
      detail_mode: separate_page   # 列表不含正文，需单独请求详情页解析 zendesk-html div
      has_update_time: false
      strategy: full_scan
      field_mapping:
        article_id: documentId   # 新文章是小写字母数字 slug，旧文章（新系统里仍能查到）是
          # Zendesk 数字 ID 字符串，两种格式都按字符串原样存
        title: name
        content: (详情页 <div class="zendesk-html"> 内层 HTML，非列表字段)
        post_time: createdAt   # unix 毫秒时间戳
        category: sectionId   # 数值，直接落库进 raw_category；跟旧 Zendesk section_id 同一套体系
      # 真实样本（Spot events section，2026-07-14 抓取）：
      #   l3v3t1vvcpzqq2vza2y0upyb createdAt=1783848600000 (2026-07-12T09:30:00Z)
      #     "edgeX (EDGE) is live on WE-Launch—share 8,000 EDGE in airdrops!"
      #   jardouvu207hhp7lbfvclxmo createdAt=1783589400000 (2026-07-09T09:30:00Z)
      #     "Uniswap (UNI) WE-Launch..."
      # 与用户截图日期（北京时间 2026/07/12 17:30、2026/07/09 17:30 = UTC+8）精确对上。
      # 【2026-07-20 新增 campaign_endpoint，见 CLAUDE.md「补充活动类内容采集端口」】
      # 常规帮助中心只覆盖 Zendesk 迁移出来的分类，验证后发现 /rewards 活动奖励
      # 落地页上很多内容根本不在帮助中心里出现过。标准 __NEXT_DATA__（不是 flight
      # 流），props.pageProps.myPopular[] 就是固定精选列表（18 条），详情页
      # （/[locale/]events/{promo|roll|draw}/{slug}）真的 SSR 出了正文，是四个新
      # 端口里唯一一个详情页有正文可用的，解析细节见 src/parsers/weex_rewards.py。
      campaign_endpoint:
        endpoint: "https://www.weex.com/rewards"
        locale_path: ""   # EN 无前缀（/en/rewards 会 301 到无前缀，真实验证过）
        pagination: {type: none, note: "固定精选列表（myPopular），非真分页"}
        rate_limit_ms: 500
        strategy: full_scan
    FR:
      locale_path: "fr"
      categories:
        latest_announcements:
          endpoint: "https://www.weex.com/fr/help/categories/18540264809497"
        listings_delistings:
          endpoint: "https://www.weex.com/fr/help/categories/44507081559193"
        p2p_announcement:
          endpoint: "https://www.weex.com/fr/help/sections/49365180202777"
        latest_updates:
          endpoint: "https://www.weex.com/fr/help/sections/18540289930137"
      method: GET
      headers: {}
      pagination: {type: query_page, page_size: 65, max_pages: 2}
      rate_limit_ms: 500
      detail_mode: separate_page
      has_update_time: false
      strategy: full_scan
      field_mapping:
        article_id: documentId
        title: name
        content: (详情页 <div class="zendesk-html"> 内层 HTML，非列表字段)
        post_time: createdAt
        category: sectionId
      campaign_endpoint:
        endpoint: "https://www.weex.com/fr/rewards"
        locale_path: "fr/"   # 拼详情页 URL 用，注意要带尾部斜杠
        pagination: {type: none, note: "同 EN，固定精选列表（11 条，真实核对过法语译文）"}
        rate_limit_ms: 500
        strategy: full_scan
  bingx:
    # ============================================================
    # 侦察结论（Phase 1，2026-07-13）：✅ 通，EN/VN。Nuxt 3 SSR（不是 SPA），
    # 数据内嵌在 `<script id="__NUXT_DATA__">` 里（devalue 索引引用格式，需要
    # 简单解析：整数值是同一数组内的索引引用）。列表页首屏只给最新 ~20 条
    # （"Latest Announcements" 分区 total=190），?page=/?sectionId= 等 query
    # 参数不改变 SSR 输出，翻页是客户端交互（未逆向，按时间盒子要求）。
