    #     提取纯文本/转 HTML 的 parser，Phase 2 需要写）。
    #   全部 3 个接口均为匿名公开访问，不需要任何 cookie/session/签名——直接用
    #   Python urllib（无浏览器上下文）重放同样的请求也是 200，说明这不是靠
    #   浏览器会话才能访问的接口，日常采集不需要 headless browser，只是"找到
    #   endpoint"这一步用了一次 headless。
    #   10 次连续请求 500ms 间隔全部 200，无限流；robots.txt 未禁止。
    #   实测 5 个 locale × 4 个 menuId 的 totalCount（pageSize=1 探测）：
    #     menuId 26  Platform Announcement:      EN 552 / FR 266 / EN-Asia 126 / VN 433 / ID 56
    #     menuId 69  Exclusive Events:            EN 0   / FR 0   / EN-Asia 65  / VN 0   / ID 0
    #     menuId 123 New Product Announcement:   EN 40  / FR 16  / EN-Asia 3   / VN 35  / ID 7
    #     menuId 145 Platform Events:             EN 101 / FR 75  / EN-Asia 121 / VN 68  / ID 53
    #   update_time 可靠性抽样（menuId 26，EN，10 条列表条目的 gmtCreatedAt vs
    #   gmtUpdatedAt，unix ms）：10/10 全部存在真实差异（例：article 4116
    #   created 1783931588556 updated 1783939844802，相差约 2.3 小时）——
    #   判定 strategy: watermark，用 gmtUpdatedAt 做水位线。
    #   分类映射：Platform Announcement 类比 news/other 综合公告；New Product
    #   Announcement 对应 product；Platform Events 对应 campaign；Exclusive
    #   Events（仅 EN-Asia 有数据）也归入 campaign 范畴。
    #   【Phase 2 批次 2 实测澄清】上面这句"strategy: watermark"描述的是
    #   crawl_state.high_watermark 会被正常写入（gmtUpdatedAt 数据可靠），但实现
    #   批次 2 时发现列表接口排序不可靠（同页内 gmtUpdatedAt 非单调，见
    #   src/collectors/zoomex.py 顶部注释），不能依赖"遇到 update_time <= since
    #   就提前退出翻页"这套 watermark 的核心机制。所以 ZoomexCollector 每轮都会
    #   翻完全部页，增量效果改由 needs_detail()（逐条比对 DB 里已存的 update_time）
    #   实现，不依赖 high_watermark。也就是说 high_watermark 仅供观测/监控用
    #   （能看出"最近一次采集看到的最大更新时间"），不参与采集是否要继续翻页的
    #   决策——跟 Bitunix/Weex 那种"watermark 真正驱动早停翻页"的用法不是一回事，
    #   Phase 8 监控逻辑设计时不要假设二者行为一致。
    # ============================================================
    EN:
      categories:
        platform_announcement:
          menu_id: 26
        new_product_announcement:
          menu_id: 123
        platform_events:
          menu_id: 145
      endpoint: "https://api2.zoomex.com/gw/pub/v1/helpCenter/getArticleListByMenuId"
      detail_endpoint: "https://api2.zoomex.com/gw/pub/v1/helpCenter/getArticleById"   # body: {"id": "<articleId>"}
      method: POST
      headers: {"Content-Type": "application/json"}
      locale_param: "body:lang"   # 请求体里的 lang 字段，值 "en-US"（不是 URL path，与其它源不同）
      pagination: {type: offset, param: "body:pageNum", page_size_param: "body:pageSize", page_size: 30}
      rate_limit_ms: 500   # 10 次连续请求 500ms 间隔全部 200，无限流
      detail_mode: separate_api   # 列表接口只有 title，正文（content，富文本 JSON）需另调 getArticleById
      has_update_time: true   # gmtUpdatedAt，抽样 10 条全部与 gmtCreatedAt 存在真实差异
      strategy: watermark
      field_mapping:
        article_id: article.id   # 跨 locale 一致（同一篇文章不同语言版本共享同一个 articleId），可直接做 group_id
        title: contents[lang].title   # 列表接口 contents[] 数组里按 lang 匹配的那一项
        content: contents[lang].content   # 仅 getArticleById 详情接口有；富文本 JSON 字符串，需专门 parser 转纯文本/HTML
        post_time: article.gmtCreatedAt   # unix 毫秒
        update_time: article.gmtUpdatedAt   # unix 毫秒，抽样确认可靠
        category: null   # 固定值，取决于抓取时用的哪个 categories.* menu_id，无需逐条解析
      lang_code: "en-US"
