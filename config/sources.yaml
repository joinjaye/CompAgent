  zoomex:  # 我方基线，非竞品
    # ============================================================
    # 侦察结论（Phase 1，2026-07-13）：BLOCKED，所有 5 个 locale。
    # help.zoomex.com/{locale}/... 是纯客户端渲染的 Nuxt 3 SPA。已尝试：
    #   1. 直接请求列表页/详情页 HTML —— 服务端只返回通用 SPA 壳（538555 字节，
    #      5 个 locale 完全 md5 一致），正文靠客户端 JS 运行时渲染，curl 拿不到。
    #   2. Nuxt `_payload.json` hydration 约定 —— 返回 200 但 content-type 是
    #      text/html（同一个壳），不是真的 payload endpoint。
    #   3. 下载并 grep 主 JS bundle + 全部 263 个引用的 Vite chunk —— 只找到
    #      `/gw/pub/v1/helpCenter/getHotTopArticle`、`getHotArticleList` 两个
    #      POST 端点（用于"热门文章"小组件，非公告列表本身），且未能确认其
    #      请求体参数，为避免猜测未调用。API host 确认为 https://api2.zoomex.com，
    #      但公告列表/详情的真实 path 未能从静态分析中还原。
    #   4. sitemap.xml -> sitemap-local.xml（854KB）—— 只列出 14 个顶层
    #      /{locale}/help 落地页 URL，没有逐条公告文章的 URL。
    #   5. WebSearch 未找到公开的 help-center API 文档（只有需要 X-BAPI-* 签名的
    #      交易 API 文档，与公告无关）。
    #   6. 直接 curl 4 个 Google 收录的真实文章 URL（如 help.zoomex.com/en/article/3858）
    #      —— 同样只返回通用壳，说明该页面依赖运行时 JS，Google 索引是通过无头
    #      浏览器渲染的。
    # robots.txt（www.zoomex.com）：User-agent: * / Disallow: 空，未禁止任何路径。
    # 建议方案：需要 headless browser（Playwright/Puppeteer）实际加载页面并
    # 拦截运行时对 api2.zoomex.com 发出的 XHR/fetch 请求，才能拿到真实 endpoint；
    # 或者因为 Zoomex 是我方产品，直接找内部研发要 api2.zoomex.com 公告接口的
    # 真实文档，而不是从外部逆向。
    # Fixture: tests/fixtures/zoomex_EN.html（5 个 locale md5 相同，只保留一份
    # 作为"确认是同一个空壳"的证据，未重复存 4 份重复文件）。
    # ============================================================
    EN:
      endpoint: null
      method: null
      headers: {}
      locale_param: "path"   # 已确认 URL 结构 www.zoomex.com/{locale}/help/{catalogId}
